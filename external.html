<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>외부활동 공유 - 남양주시 문화의집</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/projectnoonnu/2412-1@1.0/Paperlogy-All.css">

    <style>
        /* 💡 [수정] 다른 페이지와 일치하도록 기본 폰트를 Paperlogy로 변경했습니다. */
        body {
            font-family: 'Paperlogy', sans-serif;
            background: #faf8ff;
        }

        /* 💡 [수정] 아이콘 폰트 패밀리가 페이퍼로지에 덮어씌워져 깨지지 않도록 속성을 고정했습니다. */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 !important;
            display: inline-block !important;
            vertical-align: middle !important;
            text-transform: lowercase !important;
            font-style: normal !important;
            letter-spacing: normal !important;
            word-wrap: normal !important;
            white-space: nowrap !important;
            direction: ltr !important;
        }

        .glass {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e7eb;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3182f6 !important;
            box-shadow: 0 0 0 4px rgba(49,130,246,0.12);
        }

        .hero {
            background: linear-gradient(135deg,#3182f6,#004ac6);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

<header class="glass sticky top-0 z-50 border-b">
    <div class="max-w-[1200px] mx-auto px-6 h-16 flex items-center justify-between">
        
        <div class="flex items-center gap-2 font-bold text-blue-600">
            남양주시 문화의집
        </div>

        <div class="flex items-center gap-3 text-sm text-gray-500">
            <button onclick="location.href='index.html'"
                class="p-2 rounded-full hover:bg-gray-100 transition"
                title="메인으로">
                <span class="material-symbols-outlined">home</span>
            </button>
        </div>

    </div>
</header>

<main class="flex-grow max-w-[1200px] mx-auto w-full px-6 py-10 flex flex-col justify-center">

    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-900">외부활동 공유하기</h1>
        <p class="text-gray-500 mt-1">동아리 활동을 등록하고 공유하세요</p>
    </div>

    <div class="glass rounded-2xl shadow-xl overflow-hidden">

        <div class="hero px-6 py-4 text-white flex items-center gap-2">
            <span class="material-symbols-outlined">info</span>
            <span class="font-bold">행사 기본 정보 입력</span>
        </div>

        <form id="ext-form" class="p-6 space-y-5" onsubmit="return false;">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div>
                    <label class="text-sm text-gray-600">동아리 이름</label>
                    <input id="e_club"
                        class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                        placeholder="동아리 명을 입력하세요"
                        required
                        type="text"/>
                </div>

                <div>
                    <label class="text-sm text-gray-600">연락처</label>
                    <input id="e_phone"
                        class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                        placeholder="010-0000-0000"
                        maxlength="13"
                        required
                        type="tel"/>
                </div>

            </div>

            <div>
                <label class="text-sm text-gray-600">행사명</label>
                <input id="e_event"
                    class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                    placeholder="행사 제목을 입력하세요"
                    required
                    type="text"/>
            </div>

            <div>
                <label class="text-sm text-gray-600">상세 내용</label>
                <textarea id="e_content"
                    class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                    rows="4"
                    placeholder="상세 정보를 입력하세요 (필수 입력)"
                    required></textarea>
            </div>

            <div>
                <label class="text-sm text-gray-600">행사 일시</label>
                <input id="e_date"
                    class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                    type="datetime-local"
                    required/>
            </div>

            <input type="text" id="honeypot" class="hidden" style="display:none !important">

            <div class="flex gap-3 pt-4">

                <button type="button"
                        id="btn-submit-ext"
                        onclick="sendPost('submitExternal')"
                        class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">
                    공유하기
                </button>

                <button type="button"
                        onclick="location.href='index.html'"
                        class="px-6 py-3 bg-gray-200 rounded-xl font-medium hover:bg-gray-300 transition">
                    메인으로
                </button>

            </div>

        </form>
    </div>

</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
function formatPhoneNumber(value) {
    if (!value) return value;
    const phoneNumber = value.replace(/[^\d]/g, '');
    const phoneNumberLength = phoneNumber.length;
    if (phoneNumberLength < 4) return phoneNumber;
    if (phoneNumberLength < 8) {
        return `${phoneNumber.slice(0, 3)}-${phoneNumber.slice(3)}`;
    }
    return `${phoneNumber.slice(0, 3)}-${phoneNumber.slice(3, 7)}-${phoneNumber.slice(7, 11)}`;
}

document.getElementById('e_phone').addEventListener('input', (e) => {
    e.target.value = formatPhoneNumber(e.target.value);
});

function getOrCreateUID() {
    let uid = localStorage.getItem("user_unique_id");
    if (!uid) {
        uid = 'user_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem("user_unique_id", uid);
    }
    return uid;
}

async function sendPost(mode) {
    if (mode === 'submitExternal') {
        const honeypot = document.getElementById('honeypot').value;
        if (honeypot) {
            return; 
        }

        const club = document.getElementById('e_club').value.trim();
        const phone = document.getElementById('e_phone').value.trim();
        const eventName = document.getElementById('e_event').value.trim();
        const content = document.getElementById('e_content').value.trim();
        const dateTime = document.getElementById('e_date').value;

        if (!club || !phone || !eventName || !content || !dateTime) {
            alert("동아리 이름, 연락처, 행사명, 상세 내용, 행사 일시는 모두 기입해 주셔야 합니다.");
            return;
        }

        if (phone.length < 12) {
            alert("연락처를 정확한 형식(010-0000-0000)으로 기입해 주세요.");
            return;
        }

        const btn = document.getElementById('btn-submit-ext');
        btn.innerText = "공유 처리 중...";
        btn.disabled = true;

        // 💡 [해결 조치] 백엔드 매핑 필드 불일치 방지를 위해 예상되는 키들을 모두 채워서 전송합니다.
        const res = await apiPost({
            mode: mode,
            club: club,
            phone: phone,
            eventName: eventName, // 기존 키명
            event: eventName,     // 대체 키명 1
            title: eventName,     // 대체 키명 2
            content: content,
            dateTime: dateTime,
            uid: getOrCreateUID()
        });

        btn.innerText = "공유하기";
        btn.disabled = false;

        if (!res) {
            alert("서버 연결에 실패했습니다. api.js 연동 상태를 체크해 주세요.");
            return;
        }

        if (res.error) {
            alert(res.error);
            return;
        }

        alert("등록이 완료되었습니다.");

        document.getElementById('e_club').value = "";
        document.getElementById('e_phone').value = "";
        document.getElementById('e_event').value = "";
        document.getElementById('e_content').value = "";
        document.getElementById('e_date').value = "";
    }
}
</script>

</body>
</html>
