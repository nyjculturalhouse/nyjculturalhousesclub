<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>외부활동 공유</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="overlay"></div>
<div id="toast">제출 완료 ✅</div>

<div class="container">

    <div id="view-external" class="card">

        <h3>외부활동 공유</h3>

        <input id="e_club" placeholder="동아리 이름">

        <input id="e_phone" placeholder="연락처">

        <input id="e_event" placeholder="행사명">

        <input id="e_content" placeholder="상세 내용">

        <label>행사 일시</label>

        <input id="e_date" type="datetime-local">

        <button
            class="btn primary"
            id="btn-submit-ext"
            onclick="sendPost('submitExternal')"
            style="margin-top:30px;"
        >
            공유하기
        </button>

        <button class="btn secondary" onclick="location.href='index.html'">
            메인으로
        </button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
