<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>외부활동 공유 - 동아리 외부활동 공유</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #faf8ff;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e7eb;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3182f6 !important;
            box-shadow: 0 0 0 4px rgba(49,130,246,0.12);
        }

        .hero {
            background: linear-gradient(135deg,#3182f6,#004ac6);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

<!-- TOP BAR -->
<header class="glass sticky top-0 z-50 border-b">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2 font-bold text-blue-600">
            <span class="material-symbols-outlined">hub</span>
            Culture Connect
        </div>
    </div>
</header>

<main class="flex-grow flex items-center justify-center p-6">

<div class="w-full max-w-3xl">

    <!-- TITLE -->
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-900">외부활동 공유하기</h1>
        <p class="text-gray-500 mt-1">동아리 활동을 등록하고 공유하세요</p>
    </div>

    <!-- CARD -->
    <div class="glass rounded-2xl shadow-xl overflow-hidden">

        <!-- HEADER -->
        <div class="hero px-6 py-4 text-white flex items-center gap-2">
            <span class="material-symbols-outlined">info</span>
            <span class="font-bold">행사 기본 정보 입력</span>
        </div>

        <!-- FORM -->
        <form id="ext-form" class="p-6 space-y-5">

            <!-- ROW 1 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div>
                    <label class="text-sm text-gray-600">동아리 이름</label>
                    <input id="e_club"
                        class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                        placeholder="동아리 명을 입력하세요"
                        required
                        type="text"/>
                </div>

                <div>
                    <label class="text-sm text-gray-600">연락처</label>
                    <input id="e_phone"
                        class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                        placeholder="010-0000-0000"
                        required
                        type="tel"/>
                </div>

            </div>

            <!-- EVENT -->
            <div>
                <label class="text-sm text-gray-600">행사명</label>
                <input id="e_event"
                    class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                    placeholder="행사 제목을 입력하세요"
                    required
                    type="text"/>
            </div>

            <!-- CONTENT -->
            <div>
                <label class="text-sm text-gray-600">상세 내용</label>
                <textarea id="e_content"
                    class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                    rows="4"
                    placeholder="상세 정보를 입력하세요"></textarea>
            </div>

            <!-- DATE -->
            <div>
                <label class="text-sm text-gray-600">행사 일시</label>
                <input id="e_date"
                    class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-3"
                    type="datetime-local"
                    required/>
            </div>

            <!-- BUTTONS -->
            <div class="flex gap-3 pt-4">

                <button type="button"
                        id="btn-submit-ext"
                        onclick="sendPost('submitExternal')"
                        class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">
                    공유하기
                </button>

                <button type="button"
                        onclick="location.href='index.html'"
                        class="px-6 py-3 bg-gray-200 rounded-xl font-medium hover:bg-gray-300 transition">
                    취소
                </button>

            </div>

        </form>
    </div>
</div>

</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
