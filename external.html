<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>외부활동 공유 - Culture Connect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf8ff; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-pattern { background-color: #faf8ff; }
        .hero-gradient { background: linear-gradient(135deg, #3182f6 0%, #004ac6 100%); }
        input:focus, textarea:focus { outline: none; border-color: #3182f6 !important; box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

<main class="flex-grow flex bg-pattern p-md lg:p-2xl">
    <div class="max-w-4xl mx-auto w-full">
        <header class="mb-xl">
            <h1 class="text-3xl font-bold text-gray-900">외부활동 공유하기</h1>
        </header>

        <div class="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-200">
                <span class="font-bold text-gray-700 flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-600 text-sm">info</span>
                    행사 기본 정보 입력
                </span>
            </div>
            
            <form id="ext-form" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-gray-700">동아리 이름</label>
                        <input id="e_club" class="w-full rounded-xl border-gray-300 shadow-sm" placeholder="동아리 명을 입력하세요" required type="text"/>
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-gray-700">연락처</label>
                        <input id="e_phone" class="w-full rounded-xl border-gray-300 shadow-sm" placeholder="010-0000-0000" required type="tel"/>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700">행사명</label>
                    <input id="e_event" class="w-full rounded-xl border-gray-300 shadow-sm" placeholder="행사 제목을 입력하세요" required type="text"/>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700">상세 내용</label>
                    <textarea id="e_content" class="w-full rounded-xl border-gray-300 shadow-sm" rows="4" placeholder="상세 정보를 입력하세요"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700">행사 일시</label>
                    <input id="e_date" class="w-full rounded-xl border-gray-300 shadow-sm" type="datetime-local" required/>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="button" 
                            id="btn-submit-ext"
                            onclick="sendPost('submitExternal')" 
                            class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">
                        공유하기
                    </button>
                    <button type="button" 
                            onclick="location.href='index.html'" 
                            class="px-6 py-3 bg-gray-200 rounded-xl font-medium hover:bg-gray-300 transition-all">
                        취소
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
