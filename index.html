<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>남양주시 문화의집 웹시스템</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#0059b9",
        surface: "#f7f9fb",
        container: "#ffffff",
        onSurface: "#191c1e",
        variant: "#5e656d"
      },
      boxShadow: {
        soft: "0 10px 30px rgba(0,0,0,0.06)"
      }
    }
  }
}
</script>

<style>
body { font-family: Inter, sans-serif; background:#f7f9fb; }

.card-hover {
  transition: all .25s ease;
}
.card-hover:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}
.card-hover:active {
  transform: scale(0.98);
}

.bento-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
@media (max-width:767px){
  .bento-grid{grid-template-columns:1fr;}
}

.material-symbols-outlined{
  font-variation-settings:'FILL' 1,'wght'400,'GRAD'0,'opsz'24;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<header class="fixed top-0 left-0 w-full h-16 bg-white border-b z-50 flex items-center">
  <div class="max-w-[1200px] mx-auto w-full flex justify-between items-center px-5">
    <h1 class="font-bold text-primary text-lg">남양주시 문화의집 웹시스템</h1>

    <div class="flex gap-3">
      <button class="p-2 rounded-full hover:bg-gray-100">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <button class="p-2 rounded-full hover:bg-gray-100">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="pt-24 pb-28 max-w-[1200px] mx-auto px-5">

<!-- WELCOME -->
<section class="mb-10">
  <h2 class="text-3xl font-bold">안녕하세요!</h2>
  <p class="text-gray-500 mt-2">문화의집 동아리 통합 시스템입니다.</p>
</section>

<!-- BENTO -->
<div class="bento-grid">

  <!-- 출석 -->
  <button onclick="location.href='attendance.html'"
    class="card-hover bg-primary text-white p-8 rounded-xl text-left overflow-hidden relative md:col-span-2">

    <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-20 -mt-20"></div>

    <div class="mb-5 p-3 bg-white/20 rounded-lg inline-block">
      <span class="material-symbols-outlined text-3xl">how_to_reg</span>
    </div>

    <h3 class="text-xl font-bold mb-2">동아리 출석체크</h3>
    <p class="text-white/80 mb-6">활동 참여도를 실시간으로 기록합니다.</p>

    <div class="font-bold flex items-center gap-2">
      지금 출석하기 →
    </div>
  </button>

  <!-- 대관 -->
  <button onclick="location.href='booking.html'"
    class="card-hover bg-white p-8 rounded-xl text-left border">

    <div class="mb-5 p-3 bg-blue-50 text-blue-600 rounded-lg inline-block">
      <span class="material-symbols-outlined text-3xl">meeting_room</span>
    </div>

    <h3 class="text-lg font-bold mb-2">대관 신청</h3>
    <p class="text-gray-500 mb-6">댄스실, 동아리실, 음악실, 어울림방 예약</p>
    <div class="text-primary font-bold">예약하기 →</div>
  </button>

  <!-- 외부활동 -->
  <button onclick="location.href='external.html'"
    class="card-hover bg-white p-8 rounded-xl text-left border">

    <div class="mb-5 p-3 bg-orange-50 text-orange-600 rounded-lg inline-block">
      <span class="material-symbols-outlined text-3xl">share</span>
    </div>

    <h3 class="text-lg font-bold mb-2">외부활동 공유</h3>
    <p class="text-gray-500 mb-6">성과를 기록하고 공유</p>
    <div class="text-primary font-bold">등록하기 →</div>
  </button>

</div>

<!-- 일정 -->
<div class="mt-10">
  <button onclick="location.href='calendar.html'"
    class="w-full py-4 rounded-xl border border-blue-500 text-blue-600 font-bold hover:bg-blue-50 transition">
    📅 동아리 활동 일정 확인
  </button>
</div>

<!-- 관리자 -->
<div class="mt-10 text-center">
  <button onclick="location.href='admin.html'"
    class="text-sm text-gray-400 hover:text-gray-600">
    관리자 전용
  </button>
</div>

</main>

<!-- JS 유지 -->
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
