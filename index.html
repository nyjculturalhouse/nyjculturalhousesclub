<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>남양주시 문화의집 웹시스템</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #faf8ff; font-family: 'Inter', sans-serif; }
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        @media (max-width: 767px) { .bento-grid { grid-template-columns: 1fr; } }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.05); }
        .hidden { display: none; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:100; }
        #toast { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:10px; display:none; z-index:101; font-weight:bold; }
    </style>
</head>
<body class="bg-background text-on-surface">

    <div id="overlay"></div>
    <div id="toast">제출 완료 ✅</div>

    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-white border-b border-gray-200">
        <div class="flex items-center gap-3 max-w-[1200px] mx-auto w-full">
            <h1 class="font-bold text-primary text-xl">남양주시 문화의집 웹시스템</h1>
        </div>
    </header>

    <main class="pt-24 pb-32 px-5 max-w-[1200px] mx-auto min-h-screen">
        <section class="mb-10">
            <h2 class="text-3xl font-bold text-on-background mb-2">안녕하세요!</h2>
            <p class="text-lg text-on-surface-variant">문화의집 동아리 통합 시스템입니다.</p>
        </section>

        <div class="bento-grid">
            <button onclick="location.href='attendance.html'" class="group relative flex flex-col items-start p-8 rounded-xl shadow-sm border border-transparent card-hover transition-all bg-primary text-left overflow-hidden md:col-span-2">
                <div class="mb-6 p-4 rounded-xl bg-white/20 text-white">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">how_to_reg</span>
                </div>
                <h3 class="text-2xl font-bold text-white mb-2">동아리 출석체크</h3>
                <p class="text-white/90 mb-6">동아리원의 활동 참여도를 실시간으로 기록하세요.</p>
            </button>

            <button onclick="location.href='booking.html'" class="group relative flex flex-col items-start p-8 bg-white rounded-xl shadow-sm border border-gray-200 card-hover transition-all text-left">
                <div class="mb-6 p-4 rounded-xl bg-blue-100 text-blue-700">
                    <span class="material-symbols-outlined text-4xl">meeting_room</span>
                </div>
                <h3 class="text-xl font-bold mb-2">대관 신청</h3>
                <p class="text-gray-600 mb-6">필요한 활동 공간을 예약하세요.</p>
            </button>

            <button onclick="location.href='external.html'" class="group relative flex flex-col items-start p-8 bg-white rounded-xl shadow-sm border border-gray-200 card-hover transition-all text-left">
                <div class="mb-6 p-4 rounded-xl bg-orange-100 text-orange-700">
                    <span class="material-symbols-outlined text-4xl">share</span>
                </div>
                <h3 class="text-xl font-bold mb-2">외부활동 공유</h3>
                <p class="text-gray-600 mb-6">동아리의 멋진 성과를 자랑해 보세요.</p>
            </button>
        </div>

        <div class="mt-8">
            <button onclick="location.href='calendar.html'" class="w-full py-4 rounded-xl border-2 border-blue-600 text-blue-600 font-bold hover:bg-blue-50 transition-all">
                📅 동아리 활동 일정 확인
            </button>
        </div>

        <div class="mt-12 flex justify-center">
            <button onclick="location.href='admin.html'" class="text-gray-400 text-sm hover:text-gray-600">
                관리자 전용
            </button>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
