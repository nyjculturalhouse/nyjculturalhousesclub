<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta name="description" content="남양주시 문화의집 동아리 출석, 공간 예약, 외부활동 공유를 한곳에서 관리하는 통합 웹시스템입니다."/>
    <title>남양주시 문화의집 웹시스템</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200&icon_names=calendar_month,check_circle,event_note,home_app_logo,share_windows" rel="stylesheet" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css" />

    <script src="js/theme.js"></script>
</head>

<body>

<a href="#main-content" class="skip-link">본문 바로가기</a>

<header class="fixed top-0 left-0 w-full h-16 bg-bg border-b border-outline z-50 flex items-center">
  <div class="max-w-[1200px] mx-auto w-full flex justify-between items-center px-5">
    <h1 class="magazine-title text-primary text-xl font-bold">남양주시 문화의집 웹시스템</h1>
  </div>
</header>

<main id="main-content" class="pt-24 pb-28 max-w-[1200px] mx-auto px-5">

  <section aria-labelledby="page-intro-title" class="mb-10">
    <h2 id="page-intro-title" class="magazine-title text-4xl text-primary font-bold">문화의집 동아리 통합 시스템</h2>
    <p class="text-gray-500 mt-3 text-sm font-medium">출석, 공간 예약, 외부활동을 한곳에서 관리하세요.</p>
  </section>

  <nav aria-label="주요 기능" class="bento-grid">
    <!-- 1. 동아리 출석부 -->
    <a href="attendance.html"
      class="bg-primary hover:bg-primary-hover focus-visible:bg-primary-hover text-white p-8 rounded-xl text-left relative md:col-span-2 transition-colors block">
      <span class="material-symbols-outlined text-3xl mb-4" aria-hidden="true">check_circle</span>
      <h3 class="magazine-title text-2xl mb-2 font-bold">동아리 출석부</h3>
      <p class="text-white/80 text-sm">빠르고 정확한 출석 관리</p>
    </a>

    <!-- 2. 공간 이용 예약 -->
    <a href="booking.html"
      class="bg-surface p-8 rounded-xl text-left border border-outline shadow-sm hover:border-gray-300 transition-all block">
      <div class="mb-5 p-3 bg-bg text-primary rounded-lg inline-flex items-center justify-center" aria-hidden="true">
        <span class="material-symbols-outlined text-3xl">event_note</span>
      </div>
      <h3 class="magazine-title text-xl mb-2 text-primary font-bold">공간 이용 예약</h3>
      <p class="text-gray-500 text-sm mb-6">원하는 시간에 필요한 공간을 예약하세요.</p>
      <span class="text-primary font-bold text-sm">예약하기 →</span>
    </a>

    <!-- 3. 외부활동 공유 -->
    <a href="external.html"
      class="bg-accent-bg hover:bg-accent-hover text-accent-text p-8 rounded-xl text-left shadow-sm transition-all block">
      <div class="mb-5 p-3 bg-white/20 text-white rounded-lg inline-flex items-center justify-center" aria-hidden="true">
        <span class="material-symbols-outlined text-3xl">share_windows</span>
      </div>
      <h3 class="magazine-title text-xl mb-2 text-white font-bold">외부활동 공유</h3>
      <p class="text-white/90 text-sm mb-6">다양한 활동 소식을 간편하게 등록하세요.</p>
      <span class="text-white font-bold text-sm">등록하기 →</span>
    </a>
  </nav>

  <div class="mt-10 space-y-4">
    <a href="https://www.nyjcf.or.kr/www/1" target="_blank" rel="noopener noreferrer"
      class="w-full py-4 rounded-xl border border-primary text-primary font-bold hover:bg-gray-100 transition flex items-center justify-center gap-2 text-sm">
      <span class="material-symbols-outlined text-xl" aria-hidden="true">home_app_logo</span>
      <span>남양주문화재단<span class="sr-only"> (새 창 열림)</span></span>
    </a>

    <a href="calendar.html"
      class="w-full py-4 rounded-xl border border-primary text-primary font-bold hover:bg-gray-100 transition flex items-center justify-center gap-2 text-sm">
      <span class="material-symbols-outlined text-xl" aria-hidden="true">calendar_month</span>
      <span>동아리 활동 일정 확인</span>
    </a>
  </div>

  <div class="mt-10 text-center">
    <a href="admin.html"
      class="text-xs text-gray-400 hover:text-gray-600 underline font-medium tracking-wide">
      관리자 페이지
    </a>
  </div>

</main>

</body>
</html>
