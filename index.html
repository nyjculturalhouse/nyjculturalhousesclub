<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>남양주시 문화의집 웹시스템</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=calendar_month,check_circle,event_note,home_app_logo,share_windows" />

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: {
          DEFAULT: "#111111", // 매거진 느낌의 깊은 다크 차콜
          hover: "#222222"
        },
        accent: {
          bg: "#FF5A36",      // 힙한 오렌지 레드 포인트
          text: "#FFFFFF",
          hover: "#E04825"
        },
        surface: "#F4F4F3",   // 소프트 라이트 그레이 배경
        container: "#FFFFFF",
        onSurface: "#111111"
      },
      boxShadow: {
        soft: "0 8px 30px rgba(0,0,0,0.03)" // 플랫함을 살리는 미니멀 그림자
      }
    }
  }
}
</script>

<style>
/* 💡 전체 폰트를 Pretendard로 지정하고 기본 자간을 살짝 당겨 정돈합니다. */
body { font-family: 'Pretendard', sans-serif; background:#F4F4F3; letter-spacing: -0.01em; }

/* 💡 [수정 완료] 기존 font-weight: 800에서 요청하신 300으로 줄였습니다. */
.magazine-title {
  font-weight: 300 !important;
  letter-spacing: -0.04em !important;
  line-height: 1.1 !important;
}

.card-hover {
  transition: all .25s ease;
}
.card-hover:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.06);
}
.card-hover:active {
  transform: scale(0.98);
}

.bento-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
@media (max-width:767px){
  .bento-grid{grid-template-columns:1fr;}
}

.material-symbols-outlined{
  font-family: 'Material Symbols Outlined' !important;
  font-variation-settings:'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 !important;
  display: inline-block !important;
  vertical-align: middle !important;
  text-transform: lowercase !important;
  font-style: normal !important;
  letter-spacing: normal !important;
  word-wrap: normal !important;
  white-space: nowrap !important;
  direction: ltr !important;
}
</style>
</head>

<body>

<header class="fixed top-0 left-0 w-full h-16 bg-[#F4F4F3] border-b border-gray-200 z-50 flex items-center">
  <div class="max-w-[1200px] mx-auto w-full flex justify-between items-center px-5">
    <h1 class="magazine-title text-primary text-xl">남양주시 문화의집 웹시스템</h1>
  </div>
</header>

<main class="pt-24 pb-28 max-w-[1200px] mx-auto px-5">

<section class="mb-10">
  <h2 class="magazine-title text-4xl text-primary">문화의집 동아리 통합 시스템</h2>
  <p class="text-gray-500 mt-3 text-sm font-medium">출석, 공간 예약, 외부활동을 한곳에서 관리하세요.</p>
</section>

<div class="bento-grid">

  <button onclick="location.href='attendance.html'"
    class="card-hover bg-primary hover:bg-primary-hover text-white p-8 rounded-xl text-left overflow-hidden relative md:col-span-2">

    <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-20 -mt-20"></div>

    <div class="mb-5 p-3 bg-white/20 rounded-lg inline-flex items-center justify-center">
      <span class="material-symbols-outlined text-3xl">check_circle</span>
    </div>

    <h3 class="magazine-title text-2xl mb-2">동아리 출석부</h3>
    <p class="text-white/80 text-sm mb-6">빠르고 정확한 출석 관리</p>

    <div class="font-bold flex items-center gap-2 text-sm">
      출석 등록하기 →
    </div>
  </button>

  <button onclick="location.href='booking.html'"
    class="card-hover bg-white p-8 rounded-xl text-left border border-gray-200 shadow-soft">

    <div class="mb-5 p-3 bg-gray-100 text-primary rounded-lg inline-flex items-center justify-center">
      <span class="material-symbols-outlined text-3xl">event_note</span>
    </div>

    <h3 class="magazine-title text-xl mb-2 text-primary">공간 이용 예약</h3>
    <p class="text-gray-500 text-sm mb-6">원하는 시간에 필요한 공간을 예약하세요.</p>
    <div class="text-primary font-bold text-sm">예약하기 →</div>
  </button>

  <button onclick="location.href='external.html'"
    class="card-hover bg-accent-bg hover:bg-accent-hover text-white p-8 rounded-xl text-left border border-transparent shadow-soft">

    <div class="mb-5 p-3 bg-white/20 text-white rounded-lg inline-flex items-center justify-center">
      <span class="material-symbols-outlined text-3xl">share_windows</span>
    </div>

    <h3 class="magazine-title text-xl mb-2 text-white">외부활동 공유</h3>
    <p class="text-white/90 text-sm mb-6">다양한 활동 소식을 간편하게 등록하세요.</p>
    <div class="text-white font-bold text-sm">등록하기 →</div>
  </button>

</div>

<div class="mt-10 space-y-4">
  <button onclick="window.open('https://www.nyjcf.or.kr/www/1', '_blank')"
    class="w-full py-4 rounded-xl border border-primary text-primary font-bold hover:bg-white/50 transition flex items-center justify-center gap-2 text-sm">
    <span class="material-symbols-outlined text-primary text-xl">home_app_logo</span>
    <span>남양주문화재단</span>
    <span class="text-xs font-medium text-primary/80 ml-1">남양주시 문화예술 확인하기 ▶</span>
  </button>

  <button onclick="location.href='calendar.html'"
    class="w-full py-4 rounded-xl border border-primary text-primary font-bold hover:bg-white/50 transition flex items-center justify-center gap-2 text-sm">
    <span class="material-symbols-outlined text-primary text-xl">calendar_month</span>
    <span>동아리 활동 일정 확인</span>
  </button>
</div>

<div class="mt-10 text-center">
  <button onclick="location.href='admin.html'"
    class="text-xs text-gray-400 hover:text-gray-600 underline font-medium tracking-wide">
    관리자 페이지
  </button>
</div>

</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
