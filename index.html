<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소소책방 | 홈</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { pretendard: ['Pretendard', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: "#111111", hover: "#222222" },
            accent: { bg: "#FF5A36", text: "#FFFFFF", hover: "#E04825" },
            surface: "#F4F4F3",
            container: "#FFFFFF",
            onSurface: "#111111"
          },
          boxShadow: { soft: "0 8px 30px rgba(0,0,0,0.03)" },
          borderRadius: { xl: "18px" }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/app.js" defer></script>
  <script src="./js/api.js" defer></script>
  <script src="./js/ui.js" defer></script>
  <script src="./js/utils.js" defer></script>
</head>
<body class="bg-surface text-onSurface font-pretendard">
  <!-- Header -->
  <header class="bg-container shadow-soft sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold tracking-tight">📚 소소책방</a>
      <nav class="hidden md:flex items-center gap-6 font-medium text-sm">
        <a href="index.html" class="text-accent-bg font-bold">홈</a>
        <a href="books.html" class="hover:text-accent-bg transition-colors">도서대여</a>
        <a href="rentals.html" class="hover:text-accent-bg transition-colors">대여현황</a>
        <a href="profile.html" class="hover:text-accent-bg transition-colors">내정보</a>
        <button id="logoutBtn" class="text-gray-400 hover:text-red-500 transition-colors">로그아웃</button>
      </nav>
      <button id="mobileMenuBtn" class="md:hidden material-symbols-outlined">menu</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-10 flex flex-col gap-16">
    <!-- 검색 히어로 -->
    <section class="text-center flex flex-col items-center gap-6 py-6">
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight">오늘은 어떤 책을 만나볼까요?</h1>
      <form id="homeSearchForm" class="relative w-full max-w-lg">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">search</span>
        <input type="text" id="homeSearchInput" placeholder="도서명, 저자, 출판사, ISBN" class="w-full h-14 pl-12 pr-4 bg-container rounded-xl shadow-soft border-none outline-none focus:ring-2 focus:ring-accent-bg text-sm">
      </form>
    </section>

    <!-- 카테고리 바로가기 -->
    <section>
      <div id="categoryList" class="flex gap-3 overflow-x-auto pb-2">
        <div class="h-10 w-24 skeleton shrink-0"></div>
        <div class="h-10 w-24 skeleton shrink-0"></div>
        <div class="h-10 w-24 skeleton shrink-0"></div>
      </div>
    </section>

    <!-- 신간 도서 -->
    <section>
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-bold">신간 도서</h2>
        <a href="books.html?sort=new" class="text-xs text-gray-400 hover:text-accent-bg transition-colors">전체보기</a>
      </div>
      <div id="newBooksList" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <!-- 인기 도서 TOP5 -->
    <section>
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-bold">인기 도서 TOP 5</h2>
        <a href="books.html?sort=popular" class="text-xs text-gray-400 hover:text-accent-bg transition-colors">전체보기</a>
      </div>
      <div id="popularBooksList" class="flex flex-col gap-3"></div>
    </section>
  </main>

  <div id="toastContainer" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"></div>
</body>
</html>
