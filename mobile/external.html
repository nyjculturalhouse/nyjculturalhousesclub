<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>외부활동 공유_남양주시 문화의집</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf8ff; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-on-surface pb-24">

<main class="pt-8 pb-8 px-4 max-w-md mx-auto min-h-screen">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-primary">외부활동 공유</h2>
        <p class="text-gray-600 mt-1">우리 동아리의 활동을 문화의집에 알려보세요.</p>
    </div>

    <form id="ext-form" class="glass-card p-6 rounded-2xl shadow-sm space-y-5">
        <div class="space-y-1">
            <label class="block text-sm font-medium text-gray-700 px-1">동아리 이름</label>
            <input id="e_club" class="w-full rounded-xl border-gray-300 bg-gray-50" placeholder="동아리 명칭" required type="text"/>
        </div>
        
        <div class="space-y-1">
            <label class="block text-sm font-medium text-gray-700 px-1">연락처</label>
            <input id="e_phone" class="w-full rounded-xl border-gray-300 bg-gray-50" placeholder="010-0000-0000" required type="tel"/>
        </div>

        <div class="space-y-1">
            <label class="block text-sm font-medium text-gray-700 px-1">행사명</label>
            <input id="e_event" class="w-full rounded-xl border-gray-300 bg-gray-50" placeholder="행사 제목" required type="text"/>
        </div>

        <div class="space-y-1">
            <label class="block text-sm font-medium text-gray-700 px-1">상세 내용</label>
            <textarea id="e_content" class="w-full rounded-xl border-gray-300 bg-gray-50" rows="4" placeholder="상세 설명을 입력하세요"></textarea>
        </div>

        <div class="space-y-1">
            <label class="block text-sm font-medium text-gray-700 px-1">행사 일시</label>
            <input id="e_date" class="w-full rounded-xl border-gray-300 bg-gray-50" type="datetime-local" required/>
        </div>

        <div class="pt-4 flex flex-col gap-3">
            <button type="button" id="btn-submit-ext" onclick="handleExternalSubmit()" 
                    class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md">
                공유하기
            </button>
            <button type="button" onclick="location.href='index.html'" 
                    class="w-full bg-gray-200 text-gray-700 py-4 rounded-xl font-medium hover:bg-gray-300 transition-all">
                메인으로
            </button>
        </div>
    </form>
</main>

<script>
    // 기존 sendPost 로직을 호출하는 함수
    async function handleExternalSubmit() {
        const btn = document.getElementById('btn-submit-ext');
        const originalText = btn.innerText;
        
        // 제출 효과
        btn.innerText = "전송 중...";
        btn.disabled = true;

        // 기존 외부 API 연동 호출 (js/api.js에 정의된 함수 사용)
        try {
            await sendPost('submitExternal'); 
            alert("성공적으로 공유되었습니다!");
            location.href = 'index.html';
        } catch (error) {
            alert("전송에 실패했습니다. 다시 시도해주세요.");
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
