<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>남양주시 문화의집 | Culture Connect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f7f9fb; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .elevation-card { box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="flex flex-col min-h-screen text-on-background">

<header class="fixed top-0 left-0 w-full z-50 bg-surface flex justify-between items-center h-16 px-5 border-b border-surface-container-high">
    <h1 class="font-bold text-primary text-xl">Culture Connect</h1>
    <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-variant transition-colors">
        <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
    </button>
</header>

<main class="mt-16 mb-24 px-5 flex-grow">
    <section class="py-8">
        <h2 class="text-2xl font-bold text-on-surface mb-2">안녕하세요,<br><span class="text-primary">문화의집</span>님!</h2>
        <p class="text-on-surface-variant">동아리 통합 시스템입니다.</p>
    </section>

    <div class="grid grid-cols-2 gap-4">
        <div onclick="location.href='attendance.html'" class="elevation-card bg-primary text-white rounded-xl p-6 flex flex-col justify-between aspect-square active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">how_to_reg</span>
            </div>
            <div>
                <h3 class="font-bold text-lg">동아리 출석체크</h3>
                <p class="text-xs opacity-90 mt-1">실시간 기록</p>
            </div>
        </div>

        <div onclick="location.href='booking.html'" class="elevation-card bg-surface-container-lowest rounded-xl p-6 flex flex-col justify-between aspect-square active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center">
                <span class="material-symbols-outlined text-secondary">meeting_room</span>
            </div>
            <div>
                <h3 class="font-bold text-lg text-on-surface">대관 신청</h3>
                <p class="text-xs text-on-surface-variant mt-1">공간 예약</p>
            </div>
        </div>

        <div onclick="location.href='external.html'" class="elevation-card bg-surface-container-lowest rounded-xl p-6 flex flex-col justify-between aspect-square active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-tertiary-container flex items-center justify-center">
                <span class="material-symbols-outlined text-white">share</span>
            </div>
            <div>
                <h3 class="font-bold text-lg text-on-surface">외부활동 공유</h3>
                <p class="text-xs text-on-surface-variant mt-1">성과 자랑하기</p>
            </div>
        </div>

        <div onclick="location.href='calendar.html'" class="elevation-card bg-surface-container-lowest rounded-xl p-6 flex flex-col justify-between aspect-square active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
                <span class="material-symbols-outlined text-primary">calendar_month</span>
            </div>
            <div>
                <h3 class="font-bold text-lg text-on-surface">활동 일정</h3>
                <p class="text-xs text-on-surface-variant mt-1">일정 확인</p>
            </div>
        </div>
    </div>

    <div class="mt-10">
        <button onclick="location.href='admin.html'" class="w-full py-4 bg-surface-container rounded-xl flex items-center justify-center gap-2 text-on-surface-variant font-medium hover:bg-surface-variant transition-colors">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            관리자 전용
        </button>
    </div>
</main>

<nav class="fixed bottom-0 w-full h-20 flex justify-around items-center px-4 pb-2 bg-surface-container shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-xl z-50">
    <a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1" href="index.html">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
        <span class="text-[10px] font-bold">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-secondary-container opacity-70" href="calendar.html">
        <span class="material-symbols-outlined">calendar_today</span>
        <span class="text-[10px] font-medium">Schedule</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-secondary-container opacity-70" href="booking.html">
        <span class="material-symbols-outlined">event_seat</span>
        <span class="text-[10px] font-medium">Booking</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-secondary-container opacity-70" href="external.html">
        <span class="material-symbols-outlined">share</span>
        <span class="text-[10px] font-medium">Sharing</span>
    </a>
</nav>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
