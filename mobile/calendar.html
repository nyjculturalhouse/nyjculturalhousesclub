<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>컬처 커넥트 - 동아리 활동 일정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Material 3 스타일 구성 (요청하신 테마 적용) -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0059b9",
                        "on-primary": "#ffffff",
                        "background": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#414754",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c1c6d6",
                        "secondary-container": "#dce3ec"
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-wrapper { position: relative; padding-bottom: 75%; height: 0; overflow: hidden; border-radius: 1rem; }
        .calendar-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="bg-background text-on-surface font-sans antialiased mb-24">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface-container-lowest shadow-sm h-16 flex justify-between items-center px-6">
    <div class="flex items-center gap-4">
        <button class="text-primary p-2" onclick="history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-lg font-bold text-primary">Culture Connect</h1>
    </div>
</header>

<main class="pt-24 px-6 max-w-[1200px] mx-auto">
    <!-- Page Title -->
    <section class="mb-8">
        <h2 class="text-3xl font-bold text-on-surface mb-2">동아리 활동 일정</h2>
        <p class="text-on-surface-variant">구글 캘린더를 통해 실시간 활동 일정을 확인하세요.</p>
    </section>

    <!-- Calendar Card -->
    <section class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-outline-variant/30">
        <div class="calendar-wrapper">
            <iframe 
                src="https://calendar.google.com/calendar/embed?src=50489bb94f6692f724424cec2456fc1cc336bebd077ead18d09bba1f3ef2d4b7@group.calendar.google.com&ctz=Asia/Seoul&mode=AGENDA&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0"
                scrolling="no">
            </iframe>
        </div>
    </section>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-4 bg-surface-container-lowest shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
    <button onclick="location.href='index.html'" class="flex flex-col items-center text-on-surface-variant">
        <span class="material-symbols-outlined">home</span>
        <span class="text-xs mt-1">메인</span>
    </button>
    <button class="flex flex-col items-center text-primary">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
        <span class="text-xs mt-1 font-bold">일정</span>
    </button>
    <button class="flex flex-col items-center text-on-surface-variant">
        <span class="material-symbols-outlined">notifications</span>
        <span class="text-xs mt-1">알림</span>
    </button>
</nav>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
