<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Culture Connect - 관리자 대시보드</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .hidden { display: none !important; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-on-surface pb-24">

<nav class="bg-surface-container-lowest sticky top-0 z-50 shadow-sm">
    <div class="flex justify-between items-center h-16 px-6 max-w-[1200px] mx-auto">
        <h1 class="text-headline-sm font-bold text-primary">Culture Connect</h1>
        <div class="flex items-center gap-2">
            <button class="p-2 rounded-full hover:bg-surface-container-high"><span class="material-symbols-outlined">notifications</span></button>
            <div class="w-8 h-8 rounded-full bg-primary-fixed overflow-hidden"><img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBt0iYNKKOOKHEt7R2oMGKphkZpiZZBi8zaW5v1tF_779Ixd_yzylDHXZZVwWpgI6AMZ8mGkkRLRICZqoed_S1U_TxF877YPhjC9ACTC5teZtDp1GGyu6TEsMiXZx0hb9jMJl55m1ywamu-ua1gxzp-xRSlDUplOQv1Y2uTvXJt4ZLEFhXsYVJ8hDzAl_cTQTgAWCMpcL4AqaUnARGySBnV-k9bIcXDmXNZgw7EVYoL7p4m0BzKD-w_GQ" class="w-full h-full object-cover"/></div>
        </div>
    </div>
</nav>

<main class="max-w-[1200px] mx-auto px-5 pt-6 flex flex-col gap-6">
    <header class="flex flex-col gap-1">
        <h2 class="text-3xl font-bold text-on-surface">관리자 페이지</h2>
        <p class="text-on-surface-variant">운영 현황을 한눈에 관리하세요.</p>
    </header>

    <section class="grid grid-cols-1 gap-4">
        <div onclick="showAdminTab('stats')" class="bg-primary text-white p-6 rounded-xl shadow-lg cursor-pointer transition-transform active:scale-[0.98]">
            <h3 class="font-bold text-lg">동아리 주간 출석 현황</h3>
            <p class="text-sm opacity-90">지난 7일간의 지표 확인</p>
        </div>
        <div onclick="showAdminTab('attendance-check')" class="bg-white p-6 rounded-xl shadow-sm border border-outline-variant/30 cursor-pointer transition-transform active:scale-[0.98]">
            <h3 class="font-bold text-lg text-on-surface">출석 체크 현황</h3>
            <p class="text-sm text-on-surface-variant">QR 및 수동 출석 기록</p>
        </div>
        <div onclick="showAdminTab('calendar')" class="bg-white p-6 rounded-xl shadow-sm border border-outline-variant/30 cursor-pointer transition-transform active:scale-[0.98]">
            <h3 class="font-bold text-lg text-on-surface">대관 캘린더</h3>
            <p class="text-sm text-on-surface-variant">시설물 사용 일정 확인</p>
        </div>
    </section>

    <div id="admin-content-area" class="bg-white p-6 rounded-xl shadow-sm border border-outline-variant/30 min-h-[300px]">
        
        <div id="admin-stats-section" class="hidden">
            <h3 class="text-xl font-bold mb-4">동아리 주간 출석 현황</h3>
            <div id="admin-stats-content">데이터를 불러오는 중...</div>
        </div>

        <div id="admin-attendance-check-section" class="hidden">
            <h3 class="text-xl font-bold mb-4">출석 체크 현황</h3>
            <div id="attendance-check-content" class="overflow-x-auto">불러오는 중...</div>
        </div>

        <div id="admin-calendar-section" class="hidden">
            <h3 class="text-xl font-bold mb-4">대관 캘린더</h3>
            <div class="w-full h-[400px] rounded-xl overflow-hidden">
                <iframe src="https://calendar.google.com/calendar/embed?src=29f49ca08ab45c6d905555a73977703f275fd464e254ed959725c9046b3a6436%40group.calendar.google.com&ctz=Asia%2FSeoul" class="w-full h-full border-0"></iframe>
            </div>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 w-full z-50 bg-surface shadow-[0_-4px_20px_rgba(0,0,0,0.05)] flex justify-around p-3">
    <a href="#" class="flex flex-col items-center text-primary"><span class="material-symbols-outlined">dashboard</span><span class="text-xs">홈</span></a>
    <a href="index.html" class="flex flex-col items-center text-on-surface-variant"><span class="material-symbols-outlined">home</span><span class="text-xs">메인</span></a>
</nav>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    adminAuth();

    function showAdminTab(tab) {
        document.getElementById('admin-stats-section').classList.add('hidden');
        document.getElementById('admin-attendance-check-section').classList.add('hidden');
        document.getElementById('admin-calendar-section').classList.add('hidden');

        if(tab === 'stats') {
            document.getElementById('admin-stats-section').classList.remove('hidden');
            // loadStats();
        } else if(tab === 'attendance-check') {
            document.getElementById('admin-attendance-check-section').classList.remove('hidden');
            loadAttendanceCheck();
        } else if(tab === 'calendar') {
            document.getElementById('admin-calendar-section').classList.remove('hidden');
        }
    }

    async function loadAttendanceCheck() {
        const box = document.getElementById('attendance-check-content');
        box.innerHTML = `<p class="py-4 text-center">데이터를 불러오는 중...</p>`;
        try {
            const data = await apiGet("getAttendanceStatus");
            if(!data || data.length === 0) return box.innerHTML = `<p class="py-4 text-center">데이터 없음</p>`;
            
            let html = `<table class="w-full text-sm"><thead><tr class="text-left text-on-surface-variant"><th class="py-2">동아리</th><th>이전</th><th>이번</th></tr></thead><tbody>`;
            data.forEach(d => {
                html += `<tr class="border-t border-surface-container-highest"><td class="py-3 font-semibold">${d.club}</td>
                    <td class="py-3 ${d.lastWeek ? 'text-blue-600' : 'text-red-500'}">${d.lastWeek ? '완료' : '미체크'}</td>
                    <td class="py-3 ${d.thisWeek ? 'text-blue-600' : 'text-red-500'}">${d.thisWeek ? '완료' : '미체크'}</td></tr>`;
            });
            html += `</tbody></table>`;
            box.innerHTML = html;
        } catch(e) { box.innerHTML = `<p class="py-4 text-center text-red-500">불러오기 실패</p>`; }
    }
</script>
</body>
</html>
