<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>대관 신청_남양주시 문화의집</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
    </style>
</head>

<body class="bg-surface text-on-surface pb-24">

<header class="fixed top-0 left-0 w-full z-50 bg-surface h-16 px-4 flex items-center shadow-sm">
    <h1 class="text-xl font-bold text-primary">대관 신청</h1>
</header>

<main class="pt-20 px-4 max-w-md mx-auto">

    <div class="grid grid-cols-3 gap-2 mb-6">
        <button onclick="showTab('form')" id="tab-form" class="py-2 rounded-lg bg-primary text-white font-bold text-sm">신청서</button>
        <button onclick="showTab('schedule')" id="tab-schedule" class="py-2 rounded-lg bg-surface-variant text-on-surface-variant font-medium text-sm">시간표</button>
        <button onclick="showTab('calendar')" id="tab-calendar" class="py-2 rounded-lg bg-surface-variant text-on-surface-variant font-medium text-sm">캘린더</button>
    </div>

    <section id="section-form" class="space-y-4">
        <div class="bg-white p-6 rounded-2xl border border-outline-variant shadow-sm">
            <div class="space-y-4">
                <input id="b_name" class="w-full h-12 rounded-lg border bg-gray-100 px-3" placeholder="신청자 이름">
                <input id="b_phone" type="tel" class="w-full h-12 rounded-lg border bg-gray-100 px-3" placeholder="전화번호 (010-0000-0000)">
                <select id="b_space" class="w-full h-12 rounded-lg border bg-gray-100 px-3">
                    <option>어울림방</option>
                    <option>댄스실</option>
                    <option>음악실</option>
                    <option>동아리방</option>
                </select>
                <button onclick="submitBookingProcess()" class="w-full h-12 bg-primary text-white rounded-xl font-bold shadow-md">
                    대관 신청하기
                </button>
            </div>
        </div>
    </section>

    <section id="section-schedule" class="hidden space-y-4">

        <div class="grid grid-cols-2 gap-2">
            <button onclick="loadSchedule('dance')" class="bg-gray-200 p-3 rounded-lg font-bold text-sm">댄스실</button>
            <button onclick="loadSchedule('music')" class="bg-gray-200 p-3 rounded-lg font-bold text-sm">음악실</button>
            <button onclick="loadSchedule('clubroom')" class="bg-gray-200 p-3 rounded-lg font-bold text-sm">동아리방</button>
            <button onclick="loadSchedule('harmony')" class="bg-gray-200 p-3 rounded-lg font-bold text-sm">어울림방</button>
        </div>

        <iframe id="schedule-frame"
            src="https://drive.google.com/file/d/1yxM0hEBg6i5G9soy5fTbP0brCFh0smhn/preview"
            class="w-full h-[500px] rounded-xl border">
        </iframe>

    </section>

    <section id="section-calendar" class="hidden">
        <iframe src="https://calendar.google.com/calendar/embed?src=29f49ca08ab45c6d905555a73977703f275fd464e254ed959725c9046b3a6436%40group.calendar.google.com"
            class="w-full h-[500px] rounded-xl border"></iframe>
    </section>

</main>

<script>
function showTab(tab) {

    const sections = ['form','schedule','calendar'];

    sections.forEach(s => {
        document.getElementById('section-' + s).classList.add('hidden');
    });

    document.getElementById('section-' + tab).classList.remove('hidden');

    // 버튼 상태 안전하게 처리 (className 덮어쓰기 방지)
    sections.forEach(s => {
        const btn = document.getElementById('tab-' + s);
        btn.className = "py-2 rounded-lg bg-surface-variant text-on-surface-variant font-medium text-sm";
    });

    document.getElementById('tab-' + tab).className =
        "py-2 rounded-lg bg-primary text-white font-bold text-sm";
}

async function submitBookingProcess() {
    alert("신청 정보를 전송합니다...");
    showTab('calendar');
}

function loadSchedule(type) {

    const frame = document.getElementById('schedule-frame');

    const urls = {
        dance: 'https://drive.google.com/file/d/1yxM0hEBg6i5G9soy5fTbP0brCFh0smhn/preview',
        music: 'https://drive.google.com/file/d/1LWshNFVdXaKa5D6omvwbOsXFYGocZ3Qq/preview',
        clubroom: 'https://drive.google.com/file/d/1gLP-ECVXXXXXXX/preview',
        harmony: 'https://drive.google.com/file/d/1abcYYYYYYYYYYYY/preview'
    };

    if (urls[type]) {
        frame.src = urls[type];
    }
}
</script>

</body>
</html>
