<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Culture Connect - 출석체크</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf8ff; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="text-on-surface">

<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant shadow-sm flex justify-between items-center px-4 h-16">
    <div class="flex items-center gap-2">
        <h1 class="font-bold text-primary text-xl">Culture Connect</h1>
    </div>
    <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant">
        <span class="material-symbols-outlined">person</span>
    </div>
</header>

<main class="pt-20 pb-24 px-4 max-w-md mx-auto min-h-screen">
    
    <div id="view-days" class="space-y-6">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-on-surface mb-2">요일을 골라주세요</h2>
            <p class="text-on-surface-variant">출석을 진행할 활동 요일을 선택하세요.</p>
        </div>
        <div id="day-buttons" class="flex flex-col gap-3">
            </div>
    </div>

    <div id="view-clubs" class="hidden space-y-6">
        <button onclick="showView('view-days')" class="flex items-center text-primary font-medium mb-4">
            <span class="material-symbols-outlined">arrow_back</span> 이전으로
        </button>
        <h2 class="text-2xl font-bold text-on-surface mb-6">동아리를 골라주세요</h2>
        <div id="club-buttons" class="grid grid-cols-1 gap-3"></div>
    </div>

    <div id="view-members" class="hidden space-y-6">
        <button onclick="showView('view-clubs')" class="flex items-center text-primary font-medium mb-4">
            <span class="material-symbols-outlined">arrow_back</span> 이전으로
        </button>
        <h2 id="club-title" class="text-2xl font-bold text-primary mb-2"></h2>
        <p class="text-on-surface-variant mb-6">출석한 분들을 눌러주세요</p>
        
        <div id="member-list" class="grid grid-cols-2 gap-3"></div>

        <button id="btn-submit-att" onclick="submitAttendance()" 
                class="w-full mt-8 bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-[0.98] transition-all">
            출석 제출하기
        </button>
    </div>
</main>

<nav class="fixed bottom-0 w-full h-20 bg-surface shadow-[0_-2px_10px_rgba(0,0,0,0.05)] px-4 pb-2 flex justify-around items-center z-50 rounded-t-xl">
    <div class="flex flex-col items-center justify-center text-primary px-4 py-1">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
        <span class="text-[12px] font-medium mt-1">Schedule</span>
    </div>
    </nav>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    // 기존 웹 기능과의 연결을 위한 초기화
    document.addEventListener('DOMContentLoaded', () => {
        initDays(); // 요일 버튼 생성 (ui.js 또는 app.js에 정의된 함수)
    });

    function showView(viewId) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>

</body>
</html>
