<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리 출석체크 | 동아리 출석부</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: "#2563eb",
                    bg: "#faf8ff",
                    surface: "#ffffff",
                    outline: "#e5e7eb"
                }
            }
        }
    }
</script>

<style>
    body {
        font-family: 'Inter', sans-serif;
        background: #faf8ff;
    }

    .hidden { display: none; }

    .card {
        transition: all .2s ease;
    }
    .card:hover {
        transform: translateY(-3px);
    }

    .glass {
        background: rgba(255,255,255,0.8);
        backdrop-filter: blur(10px);
    }

    /* 선택 상태 */
    .selected {
        border: 2px solid #2563eb !important;
        background: #eff6ff !important;
    }
</style>
</head>

<body class="min-h-screen flex flex-col">

<!-- TOP BAR -->
<header class="sticky top-0 z-50 bg-white border-b border-outline">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="font-bold text-primary text-xl">동아리 출석부</div>

        <button onclick="location.href='index.html'"
                class="text-sm text-gray-600 hover:text-primary transition">
            메인으로
        </button>
    </div>
</header>

<!-- MAIN -->
<main class="flex-1 max-w-5xl mx-auto w-full px-4 py-10">

    <div id="view-attendance" class="space-y-10">

        <!-- STEP 1 DAYS -->
        <section id="step-days">
            <div class="mb-6">
                <h1 class="text-3xl font-bold text-gray-900">요일 선택</h1>
                <p class="text-gray-500 mt-1">출석을 진행할 요일을 선택하세요</p>
            </div>

            <div id="day-buttons" class="grid grid-cols-2 gap-3"></div>
        </section>

        <!-- STEP 2 CLUBS -->
        <section id="step-clubs" class="hidden">
            <div class="mb-6">
                <h1 class="text-3xl font-bold text-gray-900">동아리 선택</h1>
                <p class="text-gray-500 mt-1">출석할 동아리를 선택하세요</p>
            </div>

            <div id="club-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <!-- STEP 3 MEMBERS -->
        <section id="step-members" class="hidden">

            <div class="mb-6">
                <h1 id="club-title" class="text-2xl font-bold text-primary"></h1>
                <p class="text-gray-500">출석한 사람을 선택하세요.</p>
            </div>

            <div id="member-list" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

            <button id="btn-submit-att"
                    onclick="submitAttendance()"
                    class="w-full mt-8 bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg active:scale-[0.98]">
                출석 제출하기
            </button>

        </section>

    </div>
</main>

<!-- OVERLAY -->
<div id="overlay" class="hidden fixed inset-0 bg-black/30 z-40"></div>

<!-- TOAST -->
<div id="toast"
     class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl z-50">
    제출 완료 ✅
</div>

<!-- SCRIPTS -->
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    // ❌ initDays(); 제거됨

    // ✅ 수정: 중복 선언 방지
    window.selMembers = window.selMembers || [];
    let selClub = "";
    let selDay = "";

    /* =========================
       STEP 1 - DAYS (안정화)
    ========================= */
    const days = [
        { en: "Tuesday", ko: "화요일", key: "화" },
        { en: "Wednesday", ko: "수요일", key: "수" },
        { en: "Thursday", ko: "목요일", key: "목" },
        { en: "Friday", ko: "금요일", key: "금" },
        { en: "Saturday", ko: "토요일", key: "토" },
        { en: "Sunday", ko: "일요일", key: "일" },
    ];

    const box = document.getElementById("day-buttons");

    days.forEach(d => {
        const btn = document.createElement("button");

        btn.className =
            "p-4 rounded-xl border bg-white hover:bg-blue-50 active:scale-95 transition text-left";

        btn.innerHTML = `
            <div class="font-bold">${d.en}</div>
            <div class="text-sm text-gray-500">${d.ko}</div>
        `;

        btn.onclick = () => {

            selDay = d.key;

            document.querySelectorAll("#day-buttons button")
                .forEach(b => b.classList.remove("selected"));

            btn.classList.add("selected");

            if (typeof loadClubs === "function") loadClubs(d.key);
        };

        box.appendChild(btn);
    });

    /* =========================
       STEP 2 - CLUBS (충돌 제거)
    ========================= */
    window.loadClubs = async function(day) {

        selClub = "";
        window.selMembers = [];

        document.getElementById("step-clubs").classList.remove("hidden");
        document.getElementById("step-members").classList.add("hidden");

        const box = document.getElementById('club-buttons');
        box.innerHTML = '<p class="text-gray-500">불러오는 중...</p>';

        const clubs = await apiGet("getClubs", { day });

        box.innerHTML = "";

        if (!clubs || clubs.length === 0) {
            box.innerHTML = '<p class="text-gray-500">등록된 동아리가 없습니다.</p>';
            return;
        }

        clubs.forEach(c => {
            const b = document.createElement('button');

            b.className = "p-4 rounded-xl border bg-white hover:bg-blue-50 transition text-left";

            b.innerText = c;

            b.onclick = () => {

                selClub = c;

                document.querySelectorAll("#club-buttons button")
                    .forEach(x => x.classList.remove("selected"));

                b.classList.add("selected");

                loadMembers(c);
            };

            box.appendChild(b);
        });
    };

    /* =========================
       STEP 3 - MEMBERS (완전 동기화)
    ========================= */
    async function loadMembers(club) {

        document.getElementById("step-members").classList.remove("hidden");

        const title = document.getElementById('club-title');
        title.innerText = club;

        const box = document.getElementById('member-list');
        box.innerHTML = "";

        window.selMembers = [];

        let members = await apiGet("getMembers", { club });

        if (members.length === 1 && typeof members[0] === "string") {
            members = members[0].split(",").map(v => v.trim());
        }

        if (!members || members.length === 0) {
            box.innerHTML = '<p class="text-gray-500">등록된 인원이 없습니다.</p>';
            return;
        }

        members.forEach(m => {
            const b = document.createElement('button');

            b.className = "p-3 rounded-xl border bg-white transition";

            b.innerText = m;

            b.onclick = () => {

                const idx = window.selMembers.indexOf(m);

                if (idx > -1) {
                    window.selMembers.splice(idx, 1);
                    b.classList.remove("selected");
                } else {
                    window.selMembers.push(m);
                    b.classList.add("selected");
                }
            };

            box.appendChild(b);
        });
    }

    /* =========================
       SUBMIT (안정화 유지)
    ========================= */
    window.submitAttendance = async function () {

        if (!window.selMembers.length) {
            alert("인원을 선택하세요.");
            return;
        }

        await sendPost('submitAttendance');

        window.selMembers = [];
        selClub = "";

        document.querySelectorAll(".selected")
            .forEach(el => el.classList.remove("selected"));
    };

</script>

</body>
</html>
