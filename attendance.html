<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리 출석체크 | 동아리 출석부</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: "#2563eb",
                bg: "#faf8ff",
                surface: "#ffffff",
                outline: "#e5e7eb"
            }
        }
    }
}
</script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #faf8ff;
}

.hidden { display: none; }

.card {
    background: white;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #e5e7eb;
    transition: all .2s ease;
}

.card:hover {
    transform: translateY(-3px);
}

.selected {
    border: 2px solid #2563eb !important;
    background: #eff6ff !important;
}
</style>
</head>

<body>

<div class="max-w-2xl mx-auto px-4 py-6">

<!-- STEP 1 -->
<div id="step-days">
    <h1 class="text-xl font-bold mb-4">요일 선택</h1>
    <div id="day-buttons" class="space-y-3"></div>
</div>

<!-- STEP 2 -->
<div id="step-clubs" class="hidden">
    <h1 class="text-xl font-bold mb-4">동아리 선택</h1>
    <div id="club-buttons" class="space-y-3"></div>
</div>

<!-- STEP 3 -->
<div id="step-members" class="hidden">
    <h1 id="club-title" class="text-xl font-bold mb-4"></h1>
    <div id="member-list" class="grid grid-cols-2 gap-3"></div>

    <button id="btn-submit-att"
        onclick="submitAttendance()"
        class="mt-6 w-full bg-primary text-white py-3 rounded-xl font-bold">
        출석 제출
    </button>
</div>

</div>

<script src="js/api.js"></script>

<script>
/* =====================
   상태
===================== */
let selDay = "";
let selClub = "";
window.selMembers = [];

/* =====================
   STEP 전환 (핵심 유지)
===================== */
function showStep(step) {

    document.getElementById("step-days").classList.add("hidden");
    document.getElementById("step-clubs").classList.add("hidden");
    document.getElementById("step-members").classList.add("hidden");

    document.getElementById(step).classList.remove("hidden");
}

/* =====================
   DAYS
===================== */
const days = [
    { key:"화", label:"화요일" },
    { key:"수", label:"수요일" },
    { key:"목", label:"목요일" },
    { key:"금", label:"금요일" },
    { key:"토", label:"토요일" },
    { key:"일", label:"일요일" }
];

const dayBox = document.getElementById("day-buttons");

days.forEach(d => {
    const btn = document.createElement("button");

    btn.className = "card";
    btn.innerText = d.label;

    btn.onclick = () => {
        selDay = d.key;
        loadClubs(d.key);
    };

    dayBox.appendChild(btn);
});

/* =====================
   CLUBS
===================== */
async function loadClubs(day) {

    showStep("step-clubs");

    const box = document.getElementById("club-buttons");
    box.innerHTML = "<div class='card'>불러오는 중...</div>";

    const clubs = await apiGet("getClubs", { day });

    box.innerHTML = "";

    if (!clubs || clubs.length === 0) {
        box.innerHTML = "<div class='card'>동아리 없음</div>";
        return;
    }

    clubs.forEach(c => {
        const b = document.createElement("button");

        b.className = "card";
        b.innerText = c;

        b.onclick = () => {
            selClub = c;
            loadMembers(c);
        };

        box.appendChild(b);
    });
}

/* =====================
   MEMBERS
===================== */
async function loadMembers(club) {

    showStep("step-members");

    document.getElementById("club-title").innerText = club;

    const box = document.getElementById("member-list");
    box.innerHTML = "";

    window.selMembers = [];

    let members = await apiGet("getMembers", { club });

    if (members?.length === 1 && typeof members[0] === "string") {
        members = members[0].split(",").map(v => v.trim());
    }

    if (!members || members.length === 0) {
        box.innerHTML = "<div class='card'>인원 없음</div>";
        return;
    }

    members.forEach(m => {

        const b = document.createElement("button");
        b.className = "card";
        b.innerText = m;

        b.onclick = () => {

            b.classList.toggle("selected");

            const i = window.selMembers.indexOf(m);
            if (i > -1) window.selMembers.splice(i, 1);
            else window.selMembers.push(m);
        };

        box.appendChild(b);
    });
}

/* =====================
   SUBMIT (핵심 수정)
===================== */
async function submitAttendance() {

    if (!window.selMembers.length) {
        alert("인원을 선택하세요.");
        return;
    }

    const res = await apiPost({
        mode: "submitAttendance",
        clubName: selClub,
        attendees: window.selMembers
    });

    if (res?.error) {
        alert(res.error);
        return;
    }

    alert("출석 완료");
    window.selMembers = [];
}

</script>

</body>
</html>
