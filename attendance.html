<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="요일과 동아리, 회원을 순서대로 선택해 출석을 등록하는 페이지입니다.">
    <title>동아리 출석체크 | 동아리 출석부</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200&icon_names=home_app_logo" rel="stylesheet" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css" />

    <script src="js/theme.js"></script>
</head>

<body class="min-h-screen flex flex-col antialiased">

<a href="#main-content" class="skip-link">본문 바로가기</a>

<header class="sticky top-0 z-50 bg-[#F4F4F3] border-b border-outline">
    <div class="max-w-[1200px] mx-auto px-4 h-16 flex items-center justify-between">
        <h1 class="magazine-title text-primary text-xl">동아리 출석부</h1>
        <a href="index.html"
           class="p-2 rounded-full hover:bg-white/50 transition flex items-center justify-center text-primary"
           aria-label="메인으로 이동">
            <span class="material-symbols-outlined" aria-hidden="true">home_app_logo</span>
        </a>
    </div>
</header>

<main id="main-content" class="flex-1 max-w-[1200px] mx-auto w-full px-4 py-10">

    <ol id="attendance-steps" class="step-indicator mb-8" aria-label="출석 등록 진행 단계">
        <li aria-current="step"><span class="step-num" aria-hidden="true">1</span>요일</li>
        <li><span class="step-num" aria-hidden="true">2</span>동아리</li>
        <li><span class="step-num" aria-hidden="true">3</span>회원</li>
    </ol>

    <div id="view-attendance" class="space-y-10">

        <section id="step-days">
            <div class="mb-6">
                <h2 class="magazine-title text-2xl text-primary">요일 선택</h2>
                <p class="text-gray-700 mt-2 text-sm font-semibold">출석을 등록할 요일을 선택하세요.</p>
            </div>
            <div id="day-buttons" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </section>

        <section id="step-clubs" class="hidden">
            <div class="mb-6">
                <h2 class="magazine-title text-2xl text-primary">동아리 선택</h2>
                <p class="text-gray-700 mt-2 text-sm font-semibold">출석을 시작할 동아리를 선택하세요.</p>
            </div>
            <div id="club-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <section id="step-members" class="hidden">
            <div class="mb-6">
                <h2 id="club-title" class="magazine-title text-2xl text-primary"></h2>
                <p class="text-gray-700 mt-2 text-sm font-semibold">출석한 회원을 모두 선택하세요.</p>
            </div>
            <div id="member-list" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

            <button id="btn-submit-attendance" type="button" onclick="window.submitAttendance()"
                class="w-full mt-8 bg-accent-bg text-white py-4 rounded-xl font-bold text-lg hover:bg-accent-hover transition shadow-sm disabled:opacity-60">
                출석 제출하기
            </button>
        </section>
    </div>
</main>

<div id="result-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title" onclick="if(event.target===this) window.closeModal()">
    <div class="modal-panel p-6 text-center">
        <div id="modal-icon" class="text-4xl mb-4" aria-hidden="true"></div>
        <h2 id="modal-title" class="text-xl font-bold text-primary mb-2"></h2>
        <p id="modal-desc" class="text-gray-600 text-sm mb-6"></p>
        <button type="button" onclick="closeModal()" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-primary-hover transition">
            확인
        </button>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (window.AttendanceApp) {
            window.AttendanceApp.init();
        }
    });
</script>

</body>
</html>
