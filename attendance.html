<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동아리 출석체크 | 동아리 출석부</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home_app_logo" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                        bg: "#faf8ff",
                        surface: "#ffffff",
                        outline: "#e5e7eb"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #faf8ff; }
        .hidden { display: none; }
        
        /* 동아리/요일 클릭 시 배경은 유지하되 글자색은 검은색(#0f172a)으로 고정 */
        .selected {
            border: 2px solid #2563eb !important;
            background: #eff6ff !important;
            color: #0f172a !important; 
        }
        
        .selected * {
            color: #0f172a !important;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* 요일 내 한글/영어 위치 및 크기 반전을 위한 스타일 커스텀 */
        #day-buttons button {
            display: flex;
            flex-direction: column-reverse; /* 영어와 한글의 상하 위치를 반대로 바꿈 */
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        /* 큰 글씨(기존 영어 -> 이제 한글이 크게) */
        #day-buttons button span:first-child, 
        #day-buttons button .day-kr {
            font-size: 1.25rem !important; /* 크기를 크게 */
            font-weight: 700 !important;
        }
        /* 작은 글씨(기존 한글 -> 이제 영어가 작게) */
        #day-buttons button span:last-child,
        #day-buttons button .day-en {
            font-size: 0.85rem !important; /* 크기를 작게 */
            font-weight: 400 !important;
            opacity: 0.7;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="sticky top-0 z-50 bg-white border-b border-outline">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="font-bold text-primary text-xl">동아리 출석부</div>
        
        <button onclick="location.href='index.html'" 
                class="p-2 rounded-full hover:bg-gray-100 transition flex items-center justify-center text-gray-600" 
                title="메인으로">
            <span class="material-symbols-outlined">home_app_logo</span>
        </button>
    </div>
</header>

<main class="flex-1 max-w-5xl mx-auto w-full px-4 py-10">
    <div id="view-attendance" class="space-y-10">
        <section id="step-days">
            <div class="mb-6">
                <h1 class="text-3xl font-bold">요일 선택</h1>
                <p class="text-gray-500 mt-1">출석을 등록할 요일을 선택하세요.</p>
            </div>
            <div id="day-buttons" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="step-clubs" class="hidden">
            <div class="mb-6">
                <h1 class="text-3xl font-bold">동아리 선택</h1>
                <p class="text-gray-500 mt-1">출석을 시작할 동아리를 선택하세요.</p>
            </div>
            <div id="club-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <section id="step-members" class="hidden">
            <div class="mb-6">
                <h1 id="club-title" class="text-2xl font-bold text-primary"></h1>
                <p class="text-gray-500">출석한 회원을 모두 선택하세요.</p>
            </div>
            <div id="member-list" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            <button onclick="window.submitAttendance()" class="w-full mt-8 bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">
                출석 제출하기
            </button>
        </section>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (window.AttendanceApp) {
            window.AttendanceApp.init();
        }
    });
</script>
</body>
</html>
