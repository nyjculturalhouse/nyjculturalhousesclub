<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동아리 출석체크 | 동아리 출석부</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                        bg: "#faf8ff",
                        surface: "#ffffff",
                        outline: "#e5e7eb"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #faf8ff; }
        .hidden { display: none; }
        .selected {
            border: 2px solid #2563eb !important;
            background: #eff6ff !important;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="sticky top-0 z-50 bg-white border-b border-outline">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="font-bold text-primary text-xl">동아리 출석부</div>
        
        <button onclick="location.href='index.html'" 
                class="p-2 rounded-full hover:bg-gray-100 transition flex items-center justify-center text-gray-600" 
                title="메인으로">
            <span class="material-symbols-outlined">home</span>
        </button>
    </div>
</header>

<main class="flex-1 max-w-5xl mx-auto w-full px-4 py-10">
    <div id="view-attendance" class="space-y-10">
        <section id="step-days">
            <div class="mb-6">
                <h1 class="text-3xl font-bold">요일 선택</h1>
                <p class="text-gray-500 mt-1">출석을 진행할 요일을 선택하세요</p>
            </div>
            <div id="day-buttons" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="step-clubs" class="hidden">
            <div class="mb-6">
                <h1 class="text-3xl font-bold">동아리 선택</h1>
                <p class="text-gray-500 mt-1">출석할 동아리를 선택하세요</p>
            </div>
            <div id="club-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <section id="step-members" class="hidden">
            <div class="mb-6">
                <h1 id="club-title" class="text-2xl font-bold text-primary"></h1>
                <p class="text-gray-500">출석한 사람을 선택하세요.</p>
            </div>
            <div id="member-list" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            <button onclick="window.submitAttendance()" class="w-full mt-8 bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">
                출석 제출하기
            </button>
        </section>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    // 페이지가 로드되면 app.js에 정의된 앱을 초기화합니다.
    document.addEventListener("DOMContentLoaded", () => {
        if (window.AttendanceApp) {
            window.AttendanceApp.init();
        }
    });
</script>
</body>
</html>
