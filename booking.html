<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대관 신청 | Culture Connect</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.toast {
    visibility: hidden;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #111827;
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    z-index: 100;
    font-size: 14px;
}
.toast.show { visibility: visible; }

.tab-active {
    border-bottom: 2px solid #2563eb;
    color: #2563eb;
    font-weight: 700;
}
</style>
</head>

<body class="bg-[#faf8ff] text-gray-900 min-h-screen">

<div id="toast" class="toast">제출 완료 ✅</div>

<header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
        <h1 class="text-xl font-bold text-blue-600">Culture Connect</h1>

        <div class="flex items-center gap-2 text-sm text-gray-500">
            <span class="material-symbols-outlined text-base">calendar_month</span>
            대관 시스템
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">

<div class="mb-8">
    <h2 class="text-3xl font-bold tracking-tight">대관 신청</h2>
    <p class="text-gray-500 mt-1">공간 예약 및 일정 확인 시스템</p>
</div>

<div class="flex border-b mb-8 gap-6 text-sm font-medium">
    <button id="tab-form-btn" onclick="showBookingTab('form')" class="py-3 tab-active">신청서</button>
    <button id="tab-schedule-btn" onclick="showBookingTab('schedule')" class="py-3 text-gray-500">시간표</button>
    <button id="tab-calendar-btn" onclick="showBookingTab('calendar')" class="py-3 text-gray-500">캘린더</button>
</div>

<!-- FORM -->
<section id="booking-form-section" class="bg-white rounded-2xl border shadow-sm p-8">

    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
        <span class="material-symbols-outlined text-blue-600">edit_calendar</span>
        대관 신청서
    </h3>

    <div class="grid md:grid-cols-2 gap-6">

        <div>
            <label class="text-sm text-gray-600">신청자 이름</label>
            <input id="b_name" class="mt-2 w-full rounded-xl border-gray-300" placeholder="이름">
        </div>

        <div>
            <label class="text-sm text-gray-600">전화번호</label>
            <input id="b_phone" type="tel" class="mt-2 w-full rounded-xl border-gray-300" placeholder="010-0000-0000">
        </div>

        <div class="md:col-span-2">
            <label class="text-sm text-gray-600">공간 선택</label>
            <select id="b_space" class="mt-2 w-full rounded-xl border-gray-300">
                <option value="어울림방">어울림방</option>
                <option value="댄스실">댄스실</option>
                <option value="음악실">음악실</option>
                <option value="동아리방">동아리방</option>
            </select>
        </div>

        <!-- ✅ 추가: 사용 일시 -->
        <div>
            <label class="text-sm text-gray-600">사용 일시</label>
            <input id="b_date" type="datetime-local"
                class="mt-2 w-full rounded-xl border-gray-300">
        </div>

        <!-- ✅ 추가: 사용 시간 -->
        <div>
            <label class="text-sm text-gray-600">사용 시간(시간)</label>
            <input id="b_hours" type="number" min="1" value="1"
                class="mt-2 w-full rounded-xl border-gray-300">
        </div>

        <!-- ✅ 추가: 대관 사유 -->
        <div class="md:col-span-2">
            <label class="text-sm text-gray-600">대관 사유</label>
            <textarea id="b_content"
                class="mt-2 w-full rounded-xl border-gray-300"
                rows="3"
                placeholder="사용 목적을 입력하세요"></textarea>
        </div>

        <div class="md:col-span-2 mt-4">
            <button id="btn-submit-book"
                onclick="sendPost('submitBooking')"
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">
                대관 신청하기
            </button>
        </div>

    </div>
</section>

<!-- SCHEDULE -->
<section id="booking-schedule-section" class="hidden space-y-4">

    <div class="flex gap-3">
        <button onclick="showSchedule('dance')" class="px-4 py-2 rounded-xl bg-gray-200">댄스실</button>
        <button onclick="showSchedule('music')" class="px-4 py-2 rounded-xl bg-gray-200">음악실</button>
        <button onclick="showSchedule('clubroom')" class="px-4 py-2 rounded-xl bg-gray-200">동아리방</button>
        <button onclick="showSchedule('harmony')" class="px-4 py-2 rounded-xl bg-gray-200">어울림방</button>
    </div>

    <div class="bg-white rounded-2xl border shadow-sm p-3">
        <iframe id="schedule-frame"
            src="https://drive.google.com/file/d/1yxM0hEBg6i5G9soy5fTbP0brCFh0smhn/preview"
            class="w-full h-[600px] rounded-xl">
        </iframe>
    </div>

</section>

<!-- CALENDAR -->
<section id="booking-calendar-section" class="hidden">

    <div class="bg-white rounded-2xl border shadow-sm p-3">
        <iframe
            src="https://calendar.google.com/calendar/embed?src=29f49ca08ab45c6d905555a73977703f275fd464e254ed959725c9046b3a6436%40group.calendar.google.com"
            class="w-full h-[600px] rounded-xl">
        </iframe>
    </div>

</section>

</main>

<script>
function showBookingTab(tab) {
    document.getElementById('booking-form-section').classList.toggle('hidden', tab !== 'form');
    document.getElementById('booking-schedule-section').classList.toggle('hidden', tab !== 'schedule');
    document.getElementById('booking-calendar-section').classList.toggle('hidden', tab !== 'calendar');
}

async function sendPost(mode) {
    const data = { mode };

    if (mode === 'submitBooking') {
        data.name = document.getElementById('b_name').value;
        data.phone = document.getElementById('b_phone').value;
        data.space = document.getElementById('b_space').value;
        data.dateTime = document.getElementById('b_date').value;
        data.hours = document.getElementById('b_hours').value;
        data.content = document.getElementById('b_content').value;

        if (!data.name || !data.dateTime) {
            alert("필수 정보를 입력해주세요.");
            return;
        }
    }

    const toastEl = document.getElementById('toast');
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3000);

    alert("구글 캘린더로 자동 등록됩니다.");
}
</script>

</body>
</html>
