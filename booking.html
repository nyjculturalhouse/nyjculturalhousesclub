<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대관 신청 | Culture Connect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .toast {
            visibility: hidden; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 12px 24px; border-radius: 8px; z-index: 100;
        }
        .toast.show { visibility: visible; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<div id="toast" class="toast">제출 완료 ✅</div>

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
        <h1 class="font-bold text-blue-600 text-xl">Culture Connect</h1>
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-8">
    <div class="mb-8">
        <h2 class="text-3xl font-bold">대관 신청</h2>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-8">
        <button onclick="showBookingTab('form')" class="bg-blue-600 text-white py-2 rounded-lg font-medium">신청서</button>
        <button onclick="showBookingTab('schedule')" class="bg-gray-200 py-2 rounded-lg font-medium">시간표</button>
        <button onclick="showBookingTab('calendar')" class="bg-gray-200 py-2 rounded-lg font-medium">캘린더</button>
    </div>

    <section id="booking-form-section" class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
        <h3 class="text-xl font-bold mb-6">대관 신청서</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">신청자 이름</label>
                <input id="b_name" class="mt-1 w-full border-gray-300 rounded-lg" placeholder="이름">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">전화번호</label>
                <input id="b_phone" type="tel" class="mt-1 w-full border-gray-300 rounded-lg" placeholder="010-0000-0000" maxlength="13">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">공간 선택</label>
                <select id="b_space" class="mt-1 w-full border-gray-300 rounded-lg">
                    <option value="어울림방">어울림방</option>
                    <option value="댄스실">댄스실</option>
                    <option value="음악실">음악실</option>
                    <option value="동아리방">동아리방</option>
                </select>
            </div>
            <button id="btn-submit-book" onclick="submitBookingProcess()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mt-6 hover:bg-blue-700">대관 신청하기</button>
        </div>
    </section>

    <section id="booking-schedule-section" class="hidden space-y-4">
        <div class="grid grid-cols-2 gap-2">
            <button onclick="showSchedule('dance')" class="bg-gray-200 p-2 rounded">댄스실</button>
            <button onclick="showSchedule('music')" class="bg-gray-200 p-2 rounded">음악실</button>
        </div>
        <iframe id="schedule-frame" src="https://drive.google.com/file/d/1yxM0hEBg6i5G9soy5fTbP0brCFh0smhn/preview" class="w-full h-[600px] border rounded-xl"></iframe>
    </section>

    <section id="booking-calendar-section" class="hidden">
        <iframe src="https://calendar.google.com/calendar/embed?src=29f49ca08ab45c6d905555a73977703f275fd464e254ed959725c9046b3a6436%40group.calendar.google.com" class="w-full h-[600px] border rounded-xl"></iframe>
    </section>
</main>

<script>
    // 탭 전환 로직
    function showBookingTab(tab) {
        document.getElementById('booking-form-section').classList.toggle('hidden', tab !== 'form');
        document.getElementById('booking-schedule-section').classList.toggle('hidden', tab !== 'schedule');
        document.getElementById('booking-calendar-section').classList.toggle('hidden', tab !== 'calendar');
    }

    // 신청 처리 로직
    async function submitBookingProcess() {
        if(navigator.vibrate) navigator.vibrate(30);
        
        // 여기에 기존 작성하셨던 sendPost('submitBooking') 내부 로직을 그대로 연결합니다.
        alert("신청 정보를 전송합니다...");
        // API 연동 로직...
        
        const toastEl = document.getElementById('toast');
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 3000);
        showBookingTab('calendar');
    }

    function showSchedule(type) {
        const frame = document.getElementById('schedule-frame');
        const urls = {
            dance: 'https://drive.google.com/file/d/1LWshNFVdXaKa5D6omvwbOsXFYGocZ3Qq/preview',
            music: 'https://drive.google.com/file/d/1pNwsDWqZW7LeFJePMxHT6rnwBEwbYZpv/preview'
        };
        if(urls[type]) frame.src = urls[type];
    }
</script>
</body>
</html>
