<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>남양주시 문화의집 - 동아리 활동 일정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        // 💡 [수정] 메인 시스템 스펙과 완전히 일치하는 테마 컬러 코드를 주입했습니다.
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#111111", // 매거진 스타일의 깊은 다크 차콜
                            hover: "#222222"
                        },
                        accent: {
                            bg: "#FF5A36",      // 힙한 오렌지 레드 포인트
                            text: "#FFFFFF",
                            hover: "#E04825"
                        },
                        bg: "#F4F4F3",          // 미색이 도는 부드러운 화이트 배경
                        surface: "#ffffff",
                        outline: "#EAEAEA"
                    },
                    boxShadow: {
                        soft: "0 8px 30px rgba(0,0,0,0.03)"
                    }
                }
            }
        }
    </script>
    <style>
        /* 💡 [수정] 전체 기본 폰트를 Pretendard로 변경하고 배경을 미색 처리했습니다. */
        body { font-family: 'Pretendard', sans-serif; background-color: #F4F4F3; letter-spacing: -0.01em; }
        
        /* 💡 [핵심 가이드 적용] 타이틀 전용 힙 매거진 타이포그래피 스타일 */
        .magazine-title {
            font-weight: 800 !important;
            letter-spacing: -0.04em !important;
            line-height: 1.1 !important;
        }

        .material-symbols-outlined { 
            font-family: 'Material Symbols Outlined' !important;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 !important; 
            vertical-align: middle; 
        }
        
        .calendar-wrapper { position: relative; padding-bottom: 75%; height: 0; overflow: hidden; }
        .calendar-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

<header class="w-full top-0 sticky bg-[#F4F4F3] border-b border-outline z-50">
    <div class="flex justify-between items-center px-6 py-4 max-w-[1200px] mx-auto">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
            <div class="w-6 h-6 rounded bg-primary"></div>
            <h1 class="magazine-title text-xl text-primary">남양주시 문화의집</h1>
        </div>
        <button class="text-primary hover:opacity-70 transition flex items-center gap-1 font-bold text-sm" onclick="location.href='index.html'">
            <span class="material-symbols-outlined text-lg">home</span> 메인으로
        </button>
    </div>
</header>

<main class="flex-grow max-w-[1200px] mx-auto w-full px-6 py-10">
    <div class="mb-8">
        <h2 class="magazine-title text-3xl text-primary">동아리 활동 일정</h2>
        <p class="text-gray-500 mt-2 text-sm font-medium">실시간으로 동아리 활동 일정을 확인하세요.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-soft border border-outline p-2 md:p-3">
        <div class="calendar-wrapper rounded-xl overflow-hidden">
            <iframe 
                src="https://calendar.google.com/calendar/embed?src=50489bb94f6692f724424cec2456fc1cc336bebd077ead18d09bba1f3ef2d4b7@group.calendar.google.com&ctz=Asia/Seoul&mode=AGENDA&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0"
                frameborder="0"
                scrolling="no"
            ></iframe>
        </div>
    </div>
</main>

<footer class="w-full py-8 text-center text-xs text-gray-400 font-medium tracking-wider border-t border-outline/40">
    <p>© 2024 Culture Connect. All rights reserved.</p>
</footer>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
