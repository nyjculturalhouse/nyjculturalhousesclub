<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="description" content="남양주시 문화의집 동아리들의 외부 활동 일정을 달력으로 확인하는 페이지입니다."/>
    <title>남양주시 문화의집 - 외부 활동 일정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css" />

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="js/theme.js"></script>
</head>
<body class="min-h-screen flex flex-col antialiased relative">

<a href="#main-content" class="skip-link">본문 바로가기</a>

<header class="w-full top-0 sticky bg-[#F4F4F3] border-b border-outline z-50">
    <div class="flex justify-between items-center px-6 py-4 max-w-[1200px] mx-auto">
        <h1 class="magazine-title text-xl text-primary">남양주시 문화의집</h1>
        <a class="p-2 rounded-full hover:bg-white/50 transition text-primary" href="index.html" aria-label="메인으로 이동">
            <span class="material-symbols-outlined text-xl" aria-hidden="true">home_app_logo</span>
        </a>
    </div>
</header>

<main id="main-content" class="flex-grow max-w-[1200px] mx-auto w-full px-6 py-10">
    <div class="mb-8">
        <h2 class="magazine-title text-3xl text-primary">외부 활동 일정</h2>
        <p class="text-gray-500 mt-2 text-sm font-medium">실시간으로 외부활동 일정을 확인하세요.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-soft border border-outline p-4 md:p-6">
        <div id="calendar" aria-label="외부 활동 일정 달력"></div>
    </div>
</main>

<div id="activity-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-event-title" onclick="if(event.target===this) closeActivityModal()">
    <div class="modal-panel">
        <div class="h-1.5 bg-accent-bg w-full" aria-hidden="true"></div>

        <div class="p-6 md:p-8">
            <div class="flex justify-between items-start gap-4 mb-6">
                <div>
                    <span id="modal-club-badge" class="inline-block px-2.5 py-1 text-xs font-bold rounded-md bg-[#111111] text-white tracking-wide mb-2">동아리명</span>
                    <h2 id="modal-event-title" class="magazine-title text-2xl text-primary leading-snug">활동 내용명</h2>
                </div>
                <button type="button" onclick="closeActivityModal()" class="p-1 rounded-full text-gray-400 hover:bg-gray-100 hover:text-primary transition" aria-label="닫기">
                    <span class="material-symbols-outlined text-2xl" aria-hidden="true">close</span>
                </button>
            </div>

            <div class="space-y-4 border-t border-outline pt-6 text-sm">
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-gray-400 mt-0.5" aria-hidden="true">schedule</span>
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">시작 일시</p>
                        <p id="modal-start-time" class="text-primary font-medium mt-0.5">-</p>
                    </div>
                </div>

                <div id="modal-end-container" class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-gray-400 mt-0.5" aria-hidden="true">event_busy</span>
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">종료 일시</p>
                        <p id="modal-end-time" class="text-primary font-medium mt-0.5">-</p>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <button type="button" onclick="closeActivityModal()" class="w-full bg-[#111111] text-white font-bold py-3.5 rounded-xl hover:bg-[#222222] transition shadow-sm text-sm">
                    확인
                </button>
            </div>
        </div>
    </div>
</div>

<footer class="w-full py-8 text-center text-xs text-gray-400 font-medium tracking-wider border-t border-outline/40">
    <p>© 2026 Culture Connect. All rights reserved.</p>
</footer>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>

<script>
    function openActivityModal(club, eventName, start, end, isAllDay) {
        document.getElementById('modal-club-badge').textContent = club || "지정 안 됨";
        document.getElementById('modal-event-title').textContent = eventName || "내용 없음";
        document.getElementById('modal-start-time').textContent = formatKoreanDateTime(start, isAllDay);

        const endContainer = document.getElementById('modal-end-container');
        if (end && end !== "undefined" && end !== "null") {
            endContainer.classList.remove('hidden');
            document.getElementById('modal-end-time').textContent = formatKoreanDateTime(end, isAllDay);
        } else {
            endContainer.classList.add('hidden');
        }

        KRDSModal.open('activity-modal');
    }

    function closeActivityModal() {
        KRDSModal.close('activity-modal');
    }
    window.closeActivityModal = closeActivityModal;

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        if (!calendarEl) return;

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ko',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listWeek'
            },
            buttonText: {
                today: '오늘',
                month: '월',
                week: '주',
                list: '목록'
            },
            editable: false,
            selectable: true,

            eventClick: function(info) {
                const props = info.event.extendedProps;
                openActivityModal(
                    props.club,
                    props.event,
                    props.rawStart,
                    props.rawEnd,
                    props.isAllDay
                );
            },

            events: async function(info, successCallback, failureCallback) {
                try {
                    const activities = await apiGet("getActivities");

                    if (!activities || activities.error || !Array.isArray(activities)) {
                        successCallback([]);
                        return;
                    }

                    const events = activities.map(act => {
                        const isAllDayEvent = act.allDay === "true" || act.allDay === true;
                        const parsedStart = act.dateTime ? act.dateTime.replace(" ", "T") : undefined;
                        const parsedEnd = act.endDateTime ? act.endDateTime.replace(" ", "T") : undefined;

                        return {
                          title: `[${act.club || '동아리'}] ${act.event || '외부활동'}`,
                          start: parsedStart,
                          end: parsedEnd,
                          allDay: isAllDayEvent,
                          color: '#FF5A36',
                          extendedProps: {
                              club: act.club || "지정 안 됨",
                              event: act.event || "내용 없음",
                              rawStart: act.dateTime || "",
                              rawEnd: act.endDateTime || "",
                              isAllDay: isAllDayEvent
                          }
                        };
                    });

                    successCallback(events);
                } catch (error) {
                    console.error("외부활동 캘린더 로드 실패:", error);
                    failureCallback(error);
                }
            }
        });

        calendar.render();
    });
</script>
</body>
</html>
