<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>남양주시 문화의집 - 외부 활동 일정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    
    <script>
        // 💡 [수정] 메인 시스템 스펙과 완전히 일치하는 테마 컬러 코드를 주입했습니다.
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#111111", // 매거진 스타일의 깊은 다크 차콜
                            hover: "#222222"
                        },
                        accent: {
                            bg: "#FF5A36",      // 힙한 오렌지 레드 포인트
                            text: "#FFFFFF",
                            hover: "#E04825"
                        },
                        bg: "#F4F4F3",          // 미색이 도는 부드러운 화이트 배경
                        surface: "#ffffff",
                        outline: "#EAEAEA"
                    },
                    boxShadow: {
                        soft: "0 8px 30px rgba(0,0,0,0.03)"
                    }
                }
            }
        }
    </script>
    <style>
        /* 💡 [수정] 전체 기본 폰트를 Pretendard로 변경하고 배경을 미색 처리했습니다. */
        body { font-family: 'Pretendard', sans-serif; background-color: #F4F4F3; letter-spacing: -0.01em; }
        
        /* 💡 [수정] 요청 사항에 따라 타이틀 font-weight를 800에서 300으로 전격 조정했습니다. */
        .magazine-title {
            font-weight: 300 !important;
            letter-spacing: -0.04em !important;
            line-height: 1.1 !important;
        }

        .material-symbols-outlined { 
            font-family: 'Material Symbols Outlined' !important;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24 !important; 
            vertical-align: middle; 
        }
        
        /* FullCalendar 내부 미세 스타일 조정 (기존 디자인 무스킨 유지) */
        .fc { font-family: 'Pretendard', sans-serif; }
        .fc .fc-button-primary { background-color: #111111; border-color: #111111; }
        .fc .fc-button-primary:hover { background-color: #222222; border-color: #222222; }
        .fc .fc-button-primary:disabled { background-color: #cccccc; border-color: #cccccc; }
        .fc .fc-toolbar-title { font-size: 1.25rem !important; font-weight: 700; color: #111111; }
        .fc th { font-weight: 600; color: #555555; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

<header class="w-full top-0 sticky bg-[#F4F4F3] border-b border-outline z-50">
    <div class="flex justify-between items-center px-6 py-4 max-w-[1200px] mx-auto">
        <div class="flex items-center gap-3">
            <h1 class="magazine-title text-xl text-primary">남양주시 문화의집</h1>
        </div>
        <button class="p-2 rounded-full hover:bg-white/50 transition text-primary" onclick="location.href='index.html'" title="메인으로">
            <span class="material-symbols-outlined text-xl">home_app_logo</span>
        </button>
    </div>
</header>

<main class="flex-grow max-w-[1200px] mx-auto w-full px-6 py-10">
    <div class="mb-8">
        <h2 class="magazine-title text-3xl text-primary">외부 활동 일정</h2>
        <p class="text-gray-500 mt-2 text-sm font-medium">실시간으로 외부활동 일정을 확인하세요.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-soft border border-outline p-4 md:p-6">
        <div id="calendar"></div>
    </div>
</main>

<footer class="w-full py-8 text-center text-xs text-gray-400 font-medium tracking-wider border-t border-outline/40">
    <p>© 2024 Culture Connect. All rights reserved.</p>
</footer>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    // 💡 [교정] app.js 하단에 선언된 정형화된 외부활동(getActivities) 규격과 완전히 매칭하여 데이터를 바르게 로드합니다.
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        if (!calendarEl) return; 
        
        // app.js 내부 스크립트와 중복 실행을 방지하고 정확한 규격 매핑을 보장합니다.
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ko',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listWeek'
            },
            buttonText: {
                today: '오늘',
                month: '월',
                week: '주',
                list: '목록'
            },
            editable: false,
            selectable: true,
            events: async function(info, successCallback, failureCallback) {
                try {
                    // app.js 규칙대로 getActivities 호출
                    const activities = await apiGet("getActivities");
                    
                    if (!activities || activities.error || !Array.isArray(activities)) {
                        successCallback([]);
                        return;
                    }

                    const events = activities.map(act => {
                        const startIso = act.dateTime ? act.dateTime.replace(" ", "T") : "";
                        
                        return {
                            title: `[${act.club || '동아리'}] ${act.event || '외부활동'}`,
                            start: startIso,
                            end: act.endDateTime ? act.endDateTime.replace(" ", "T") : undefined,
                            allDay: act.allDay === "true" || act.allDay === true,
                            color: '#FF5A36' // 시그니처 힙 오렌지 테마 컬러 유지
                        };
                    });

                    successCallback(events);
                } catch (error) {
                    console.error("외부활동 캘린더 로드 실패:", error);
                    failureCallback(error);
                }
            }
        });
        
        calendar.render();
    });
</script>
</body>
</html>
