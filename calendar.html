<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Culture Connect - 동아리 활동 일정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        /* 기존 캘린더 반응형 처리를 위한 스타일 */
        .calendar-wrapper { position: relative; padding-bottom: 75%; height: 0; overflow: hidden; }
        .calendar-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="w-full top-0 sticky shadow-sm bg-white z-50">
    <div class="flex justify-between items-center px-6 py-4 max-w-[1200px] mx-auto">
        <h1 class="text-xl font-bold text-primary cursor-pointer">Culture Connect</h1>
        <button class="text-secondary hover:text-primary transition-colors flex items-center gap-1" onclick="location.href='index.html'">
            <span class="material-symbols-outlined">home</span> 메인으로
        </button>
    </div>
</header>

<main class="flex-grow max-w-[1200px] mx-auto w-full px-6 py-8">
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-on-surface">동아리 활동 일정</h2>
        <p class="text-body-md text-on-surface-variant mt-2">구글 캘린더를 통해 실시간으로 활동 일정을 확인하세요.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-outline-variant p-4 md:p-6">
        <div class="calendar-wrapper">
            <iframe 
                src="https://calendar.google.com/calendar/embed?src=50489bb94f6692f724424cec2456fc1cc336bebd077ead18d09bba1f3ef2d4b7@group.calendar.google.com&ctz=Asia/Seoul&mode=AGENDA&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0"
                frameborder="0"
                scrolling="no"
            ></iframe>
        </div>
    </div>
</main>

<footer class="w-full py-8 text-center text-sm text-secondary">
    <p>© 2024 Culture Connect. All rights reserved.</p>
</footer>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
