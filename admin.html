<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>관리자 대시보드</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <script>
        // 💡 [수정] 메인 시스템 스펙과 일치하는 테마 컬러 코드를 주입했습니다.
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#111111", // 매거진 스타일의 깊은 다크 차콜
                            hover: "#222222"
                        },
                        accent: {
                            bg: "#FF5A36",      // 힙한 오렌지 레드 포인트
                            text: "#FFFFFF",
                            hover: "#E04825"
                        },
                        bg: "#F4F4F3",          // 미색이 도는 부드러운 화이트 배경
                        surface: "#ffffff",
                        outline: "#EAEAEA"
                    },
                    boxShadow: {
                        soft: "0 8px 30px rgba(0,0,0,0.03)"
                    }
                }
            }
        }
    </script>

    <style>
        /* 💡 [수정] 기본 폰트 두께를 요구사항인 200(Extralight) 기반으로 세팅했습니다. */
        body {
            font-family: 'Pretendard', sans-serif;
            background: #F4F4F3;
            letter-spacing: -0.01em;
            font-weight: 200 !important;
        }
        .hidden { display: none !important; }

        /* 💡 [요구사항 반영] 기존 200 두께를 300(Light)으로 변경하여 세련된 가독성 확보 */
        .magazine-title {
            font-weight: 300 !important;
            letter-spacing: -0.02em !important;
            line-height: 1.2 !important;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24 !important;
            display: inline-block !important;
            vertical-align: middle !important;
            text-transform: lowercase !important;
            font-style: normal !important;
            letter-spacing: normal !important;
            word-wrap: normal !important;
            white-space: nowrap !important;
            direction: ltr !important;
        }

        .card {
            transition: all .2s ease;
            background: #ffffff;
            border: 1px solid #EAEAEA;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #111111 !important;
        }
    </style>
</head>

<body class="text-primary antialiased">

<header class="sticky top-0 z-50 bg-[#F4F4F3] border-b border-outline">
    <div class="max-w-[1200px] mx-auto px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
            <h1 class="magazine-title text-lg text-primary">남양주시 문화의집</h1>
        </div>

        <div class="flex items-center gap-4">
            <button class="text-primary hover:opacity-70 transition flex items-center gap-1 text-sm font-light" onclick="location.href='index.html'">
                <span class="material-symbols-outlined text-lg">home</span> 메인으로
            </button>
        </div>
    </div>
</header>

<main class="max-w-[1200px] mx-auto px-6 py-10">

    <div class="mb-10">
        <h2 class="magazine-title text-4xl text-primary mb-2">관리자 페이지</h2>
        <p class="text-gray-500 text-sm font-extralight">플랫폼 운영 현황 및 출석 데이터를 관리합니다.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">

        <div onclick="showAdminTab('stats')" class="card p-6 rounded-2xl cursor-pointer shadow-soft">
            <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-primary text-xl">monitoring</span>
            </div>
            <h4 class="magazine-title text-xl mb-1 text-primary">동아리 출석 통계 현황</h4>
            <p class="text-xs text-gray-400 font-extralight">주간 및 월간 참여 지표 분석</p>
        </div>

        <div onclick="showAdminTab('attendance-check')" class="card p-6 rounded-2xl cursor-pointer shadow-soft">
            <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-primary text-xl">how_to_reg</span>
            </div>
            <h4 class="magazine-title text-xl mb-1 text-primary">출석 체크 현황</h4>
            <p class="text-xs text-gray-400 font-extralight">QR / 수동 출석 관리</p>
        </div>

        <div onclick="showAdminTab('calendar')" class="card p-6 rounded-2xl cursor-pointer shadow-soft">
            <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-primary text-xl">calendar_month</span>
            </div>
            <h4 class="magazine-title text-xl mb-1 text-primary">대관 캘린더</h4>
            <p class="text-xs text-gray-400 font-extralight">시설 예약 일정 관리</p>
        </div>

    </div>

    <div id="admin-content-area" class="bg-white p-6 md:p-8 rounded-2xl border border-outline shadow-soft">

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="p-5 rounded-xl bg-gray-50 border border-outline" title="총 회원 수 473명 대비 누적 출석 데이터">
                <p class="text-xs font-extralight text-gray-500 uppercase tracking-wider">전체 누적 출석 인원 / 총원</p>
                <p class="text-3xl font-extralight text-primary mt-1"><span id="stats-total" class="font-light">-</span> <span class="text-sm font-extralight text-gray-400">/ 473명</span></p>
            </div>

            <div class="p-5 rounded-xl bg-gray-50 border border-outline">
                <p class="text-xs font-extralight text-gray-500 uppercase tracking-wider">이번 주 동아리 출석률</p>
                <p class="text-3xl font-extralight text-primary mt-1" id="stats-rate">-</p>
            </div>

            <div class="p-5 rounded-xl bg-[#FF5A36]/5 border border-[#FF5A36]/10">
                <p class="text-xs font-extralight text-[#FF5A36] uppercase tracking-wider">등록 동아리 수</p>
                <p class="text-3xl font-extralight text-accent-bg mt-1" id="stats-clubs">46개</p>
            </div>
        </div>

        <div id="admin-stats-section" class="hidden">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-4 border-b border-outline">
                <h3 class="magazine-title text-2xl text-primary">동아리 출석 현황 통계</h3>
                
                <div class="flex bg-gray-100 p-1 rounded-xl w-fit border border-outline">
                    <button id="btn-filter-week" onclick="toggleStatsPeriod('week')" class="px-4 py-2 text-xs font-light rounded-lg bg-white text-primary shadow-sm transition">
                        매주 조회 (토~금)
                    </button>
                    <button id="btn-filter-month" onclick="toggleStatsPeriod('month')" class="px-4 py-2 text-xs font-extralight rounded-lg text-gray-500 hover:text-primary transition">
                        매달 조회 (월별)
                    </button>
                </div>
            </div>

            <div id="admin-stats-content" class="overflow-x-auto">데이터를 불러오는 중...</div>
        </div>

        <div id="admin-attendance-check-section" class="hidden">
            <h3 class="magazine-title text-2xl text-primary mb-6">출석 체크 현황</h3>
            <div id="attendance-check-content" class="overflow-x-auto">
                <p class="text-gray-400 text-sm font-extralight">불러오는 중...</p>
            </div>
        </div>

        <div id="admin-calendar-section" class="hidden">
            <h3 class="magazine-title text-2xl text-primary mb-6">대관 캘린더</h3>
            <div class="w-full h-[600px] rounded-xl overflow-hidden border border-outline">
                <iframe
                    src="https://calendar.google.com/calendar/embed?src=29f49ca08ab45c6d905555a73977703f275fd464e254ed959725c9046b3a6436%40group.calendar.google.com&ctz=Asia%2FSeoul"
                    class="w-full h-full border-0">
                </iframe>
            </div>
        </div>

    </div>
</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    const TOTAL_CLUBS_COUNT = 46; 
    let currentStatsPeriod = 'week'; 
    let cachedRawStatsData = [];

    function checkAdminAccess() {
        const pw = prompt("관리자 비밀번호를 입력하세요:");
        if (pw !== "0226") {
            alert("비밀번호가 일치하지 않습니다. 메인 화면으로 이동합니다.");
            location.href = "index.html";
        } else {
            if (typeof adminAuth === "function") adminAuth();
            initDashboardData();
        }
    }
    
    checkAdminAccess();

    async function initDashboardData() {
        try {
            const statsData = await apiGet("getStats") || [];
            const attendanceStatusData = await apiGet("getAttendanceStatus") || [];
            cachedRawStatsData = statsData;

            document.getElementById("stats-clubs").innerText = TOTAL_CLUBS_COUNT + "개";

            let totalAttendancePeople = 0;
            statsData.forEach(d => {
                totalAttendancePeople += Number(d.total || 0);
            });
            document.getElementById("stats-total").innerHTML = `<span class="font-light">${totalAttendancePeople}명</span> <span class="text-sm font-extralight text-gray-400">/ 473명</span>`;

            let completedCount = 0;
            attendanceStatusData.forEach(d => {
                if(d.thisWeek === true || d.thisWeek === '완료') completedCount++;
            });
            
            const attendanceRate = TOTAL_CLUBS_COUNT > 0 ? Math.round((completedCount / TOTAL_CLUBS_COUNT) * 100) : 0;
            document.getElementById("stats-rate").innerHTML = `<span class="font-light">${attendanceRate}%</span>` + ` <span class="text-xs text-gray-400 font-extralight">(${completedCount}/${TOTAL_CLUBS_COUNT} 완료)</span>`;

            showAdminTab('stats');

        } catch (err) {
            console.error("초기 대시보드 데이터 로드 에러:", err);
        }
    }

    function showAdminTab(tab) {
        document.getElementById('admin-stats-section').classList.add('hidden');
        document.getElementById('admin-attendance-check-section').classList.add('hidden');
        document.getElementById('admin-calendar-section').classList.add('hidden');

        if(tab === 'stats') {
            document.getElementById('admin-stats-section').classList.remove('hidden');
            renderStatsTable();
        } else if(tab === 'attendance-check') {
            document.getElementById('admin-attendance-check-section').classList.remove('hidden');
            loadAttendanceCheckList();
        } else if(tab === 'calendar') {
            document.getElementById('admin-calendar-section').classList.remove('hidden');
        }
    }

    function toggleStatsPeriod(period) {
        currentStatsPeriod = period;
        const btnWeek = document.getElementById('btn-filter-week');
        const btnMonth = document.getElementById('btn-filter-month');

        if (period === 'week') {
            btnWeek.className = "px-4 py-2 text-xs font-light rounded-lg bg-white text-primary shadow-sm transition";
            btnMonth.className = "px-4 py-2 text-xs font-extralight rounded-lg text-gray-500 hover:text-primary transition";
        } else {
            btnMonth.className = "px-4 py-2 text-xs font-light rounded-lg bg-white text-primary shadow-sm transition";
            btnWeek.className = "px-4 py-2 text-xs font-extralight rounded-lg text-gray-500 hover:text-primary transition";
        }
        renderStatsTable();
    }

    function getCustomWeekRange(dateStr) {
        if(!dateStr) return "미지정 주차";
        const current = new Date(dateStr);
        if(isNaN(current.getTime())) return dateStr; 

        const day = current.getDay(); 
        const diffToSaturday = day === 6 ? 0 : -(day + 1);
        
        const satDate = new Date(current);
        satDate.setDate(current.getDate() + diffToSaturday);
        
        const friDate = new Date(satDate);
        friDate.setDate(satDate.getDate() + 6);

        const formatDate = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
        return `${satDate.getFullYear()}년 ${satDate.getMonth() + 1}월 내 (${formatDate(satDate)} ~ ${formatDate(friDate)})`;
    }

    // 💡 [렌더링 내 두께 수정] 400에 대응하던 요소들을 전부 200(font-extralight) 및 상단 정렬 300으로 매칭
    function renderStatsTable() {
        const box = document.getElementById('admin-stats-content');
        if (!box) return;

        if (!cachedRawStatsData || cachedRawStatsData.length === 0) {
            box.innerHTML = `<p class="text-gray-400 p-4 text-sm font-extralight">출석 통계 데이터가 없습니다.</p>`;
            return;
        }

        let summaryMap = {};

        if (currentStatsPeriod === 'week') {
            cachedRawStatsData.forEach(d => {
                let label = d.week;
                if(d.week && d.week.includes('-')) {
                    label = getCustomWeekRange(d.week);
                } else if(!d.week && d.date) {
                    label = getCustomWeekRange(d.date);
                }
                summaryMap[label] = (summaryMap[label] || 0) + Number(d.total || 0);
            });
        } else {
            cachedRawStatsData.forEach(d => {
                let monthLabel = "기간 미지정";
                if(d.week && d.week.includes('-')) {
                    monthLabel = d.week.substring(0, 7) + "월 통계";
                } else if(d.date) {
                    monthLabel = d.date.substring(0, 7) + "월 통계";
                } else {
                    monthLabel = (d.week || "기타").substring(0, 4) + "월 집계";
                }
                summaryMap[monthLabel] = (summaryMap[monthLabel] || 0) + Number(d.total || 0);
            });
        }

        const sortedKeys = Object.keys(summaryMap).sort((a, b) => b.localeCompare(a));

        let html = `
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 border-b border-outline">
                    <tr>
                        <th class="py-3 px-4 font-light text-gray-600 text-xs tracking-wider uppercase">${currentStatsPeriod === 'week' ? '주차 일자 (토~금)' : '해당 월'}</th>
                        <th class="py-3 px-4 font-light text-gray-600 text-xs tracking-wider uppercase">총 출석 누적 인원</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-outline">
        `;

        sortedKeys.forEach(key => {
            html += `
                <tr class="hover:bg-gray-50/50 transition">
                    <td class="py-3 px-4 text-primary font-extralight">${key}</td>
                    <td class="py-3 px-4 font-light text-primary">${summaryMap[key]}명</td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        box.innerHTML = html;
    }

    // 💡 [렌더링 내 두께 수정] 리스트 출력의 400 강도를 200(font-extralight) 단위로 다운그레이드
    async function loadAttendanceCheckList() {
        const box = document.getElementById('attendance-check-content');
        box.innerHTML = `<p class="text-gray-400 p-4 text-sm font-extralight">데이터 로딩 중...</p>`;

        try {
            const data = await apiGet("getAttendanceStatus") || [];

            if(data.length === 0) {
                box.innerHTML = `<p class="text-gray-400 p-4 text-sm font-extralight">출석 대상 동아리 내역이 없습니다.</p>`;
                return;
            }

            let html = `
                <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 border-b border-outline">
                    <tr>
                        <th class="py-3 px-4 font-light text-gray-600 text-xs tracking-wider uppercase">동아리 명</th>
                        <th class="py-3 px-4 font-light text-gray-600 text-xs tracking-wider uppercase">지난주 현황</th>
                        <th class="py-3 px-4 font-light text-gray-600 text-xs tracking-wider uppercase">이번주 현황</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-outline">
            `;

            data.forEach(d => {
                const isLastCheck = (d.lastWeek === true || d.lastWeek === '완료');
                const isThisCheck = (d.thisWeek === true || d.thisWeek === '완료');

                html += `
                    <tr class="hover:bg-gray-50/50 transition">
                        <td class="py-3 px-4 font-extralight text-primary">${d.club}</td>
                        <td class="py-3 px-4">
                            <span class="${isLastCheck ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-400'} text-[10px] font-light px-2 py-0.5 rounded tracking-wide uppercase">
                                ${isLastCheck ? '완료' : '미체크'}
                            </span>
                        </td>
                        <td class="py-3 px-4">
                            <span class="${isThisCheck ? 'bg-accent-bg text-white' : 'bg-gray-100 text-gray-400'} text-[10px] font-light px-2 py-0.5 rounded tracking-wide uppercase">
                                ${isThisCheck ? '완료' : '미체크'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            box.innerHTML = html;

        } catch(e) {
            console.error(e);
            box.innerHTML = `<p class="text-accent-bg p-4 text-sm font-light">데이터 로딩 중 에러가 발생했습니다.</p>`;
        }
    }
</script>

</body>
</html>
