<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>관리자 대시보드</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        .hidden { display: none !important; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .card {
            transition: all .2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">

<header class="sticky top-0 z-50 bg-white border-b border-slate-200">
    <div class="max-w-[1200px] mx-auto px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-blue-600"></div>
            <h1 class="font-bold text-lg text-blue-600">남양주시 문화의집</h1>
        </div>

        <div class="flex items-center gap-4">
            <span class="text-sm text-slate-500">관리자 페이지</span>
            <button onclick="location.href='index.html'"
                    class="p-2 rounded-full hover:bg-slate-100 transition flex items-center justify-center text-slate-700"
                    title="메인으로">
                <span class="material-symbols-outlined">home</span>
            </button>
        </div>
    </div>
</header>

<main class="max-w-[1200px] mx-auto px-6 py-10">

    <div class="mb-10">
        <h2 class="text-4xl font-bold text-slate-900 mb-2">관리자 페이지</h2>
        <p class="text-slate-500">플랫폼 운영 현황 및 출석 데이터를 관리합니다.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">

        <div onclick="showAdminTab('stats')"
             class="card bg-white p-6 rounded-2xl border border-slate-200 cursor-pointer hover:border-blue-500">
            <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-blue-600">monitoring</span>
            </div>
            <h4 class="font-bold text-lg mb-1">동아리 주간 출석 현황</h4>
            <p class="text-sm text-slate-500">주간 참여 지표 분석</p>
        </div>

        <div onclick="showAdminTab('attendance-check')"
             class="card bg-white p-6 rounded-2xl border border-slate-200 cursor-pointer hover:border-blue-500">
            <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-blue-600">how_to_reg</span>
            </div>
            <h4 class="font-bold text-lg mb-1">출석 체크 현황</h4>
            <p class="text-sm text-slate-500">QR / 수동 출석 관리</p>
        </div>

        <div onclick="showAdminTab('calendar')"
             class="card bg-white p-6 rounded-2xl border border-slate-200 cursor-pointer hover:border-blue-500">
            <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-blue-600">calendar_month</span>
            </div>
            <h4 class="font-bold text-lg mb-1">대관 캘린더</h4>
            <p class="text-sm text-slate-500">시설 예약 일정 관리</p>
        </div>

    </div>

    <div id="admin-content-area"
         class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">

        <div id="admin-stats-section" class="hidden">

            <h3 class="text-xl font-bold mb-4">동아리 주간 출석 현황</h3>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">

                <div class="p-5 rounded-xl bg-blue-50 border border-blue-100">
                    <p class="text-sm text-slate-500">전체 누적 출석 인원</p>
                    <p class="text-3xl font-bold text-blue-600" id="stats-total">-</p>
                </div>

                <div class="p-5 rounded-xl bg-slate-50 border border-slate-200">
                    <p class="text-sm text-slate-500">이번 주 출석률</p>
                    <p class="text-3xl font-bold text-slate-900" id="stats-rate">-</p>
                </div>

                <div class="p-5 rounded-xl bg-emerald-50 border border-emerald-100" title="현재 출석부 시스템에 등록되어 관리 중인 총 동아리 수입니다.">
                    <p class="text-sm text-slate-500 flex items-center gap-1">
                        활동 동아리 수 
                        <span class="material-symbols-outlined text-xs text-slate-400 cursor-help">help</span>
                    </p>
                    <p class="text-3xl font-bold text-emerald-600" id="stats-clubs">-</p>
                </div>

            </div>

            <div id="admin-stats-content">데이터를 불러오는 중...</div>
        </div>

        <div id="admin-attendance-check-section" class="hidden">
            <h3 class="text-xl font-bold mb-4">출석 체크 현황</h3>

            <div id="attendance-check-content" class="overflow-x-auto">
                <p class="text-slate-500">불러오는 중...</p>
            </div>
        </div>

        <div id="admin-calendar-section" class="hidden">
            <h3 class="text-xl font-bold mb-4">대관 캘린더</h3>

            <div class="w-full h-[600px] rounded-xl overflow-hidden border">
                <iframe
                    src="https://calendar.google.com/calendar/embed?src=29f49ca08ab45c6d905555a73977703f275fd464e254ed959725c9046b3a6436%40group.calendar.google.com&ctz=Asia%2FSeoul"
                    class="w-full h-full">
                </iframe>
            </div>
        </div>

    </div>
</main>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
    // 페이지 진입 시 비밀번호(0226) 검증 처리 인터셉터
    function checkAdminAccess() {
        const pw = prompt("관리자 비밀번호를 입력하세요:");
        if (pw !== "0226") {
            alert("비밀번호가 일치하지 않습니다. 메인 화면으로 이동합니다.");
            location.href = "index.html";
        } else {
            if (typeof adminAuth === "function") adminAuth();
        }
    }
    
    // 실행 호출
    checkAdminAccess();

    function showAdminTab(tab) {
        document.getElementById('admin-stats-section').classList.add('hidden');
        document.getElementById('admin-attendance-check-section').classList.add('hidden');
        document.getElementById('admin-calendar-section').classList.add('hidden');

        if(tab === 'stats') {
            document.getElementById('admin-stats-section').classList.remove('hidden');
            loadStats();
        } else if(tab === 'attendance-check') {
            document.getElementById('admin-attendance-check-section').classList.remove('hidden');
            loadAttendanceCheck();
        } else if(tab === 'calendar') {
            document.getElementById('admin-calendar-section').classList.remove('hidden');
        }
    }

    async function loadStats() {
        const box = document.getElementById('admin-stats-content');
        if (!box) return;

        box.innerHTML = `<p class="text-slate-500">데이터 불러오는 중...</p>`;

        try {
            const data = await apiGet("getStats");

            if (!data || data.length === 0) {
                box.innerHTML = `<p class="text-slate-500">출석 데이터가 없습니다.</p>`;
                return;
            }

            data.sort((a, b) => (b.week || "").localeCompare(a.week || ""));

            let html = `
                <table class="w-full text-sm">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="py-3 text-left">주차</th>
                        <th class="py-3 text-left">전체 인원</th>
                    </tr>
                </thead>
                <tbody>
            `;

            let total = 0;

            data.forEach(d => {
                total += Number(d.total || 0);

                html += `
                    <tr class="border-t hover:bg-slate-50">
                        <td class="py-3">${d.week}</td>
                        <td class="py-3 font-bold text-blue-600">${d.total}명</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            box.innerHTML = html;

            document.getElementById("stats-total").innerText = total + "명";
            document.getElementById("stats-clubs").innerText = data.length + "개";
            
            if(data[0] && data[0].total) {
                document.getElementById("stats-rate").innerText = "100%"; 
            } else {
                document.getElementById("stats-rate").innerText = "0%";
            }

        } catch (e) {
            console.error(e);
            box.innerHTML = `<p class="text-red-500">데이터 로딩 실패</p>`;
        }
    }

    async function loadAttendanceCheck() {
        const box = document.getElementById('attendance-check-content');
        box.innerHTML = `<p>데이터 로딩 중...</p>`;

        try {
            const data = await apiGet("getAttendanceStatus");

            if(!data || data.length === 0)
                return box.innerHTML = `<p>데이터가 없습니다.</p>`;

            let html = `
                <table class="w-full text-left text-sm">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="py-3">동아리</th>
                        <th class="py-3">저번주</th>
                        <th class="py-3">이번주</th>
                    </tr>
                </thead>
                <tbody>
            `;

            let completedCount = 0;

            data.forEach(d => {
                if(d.thisWeek) completedCount++;
                
                html += `
                    <tr class="border-t hover:bg-slate-50">
                        <td class="py-3 font-medium">${d.club}</td>
                        <td class="py-3 ${d.lastWeek ? 'text-blue-600' : 'text-red-500'} font-semibold">
                            ${d.lastWeek ? '완료' : '미체크'}
                        </td>
                        <td class="py-3 ${d.thisWeek ? 'text-blue-600' : 'text-red-500'} font-semibold">
                            ${d.thisWeek ? '완료' : '미체크'}
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            box.innerHTML = html;

            const attendanceRate = data.length > 0 ? Math.round((completedCount / data.length) * 100) : 0;

            document.getElementById("stats-total").innerText = data.length + "개 고정";
            document.getElementById("stats-clubs").innerText = data.length + "개";
            document.getElementById("stats-rate").innerText = attendanceRate + "%";

        } catch(e) {
            box.innerHTML = `<p class="text-red-500">불러오기 실패</p>`;
        }
    }
</script>

</body>
</html>
