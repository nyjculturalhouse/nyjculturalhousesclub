<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>관리자 페이지</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div id="view-admin" class="card">

        <h3>관리자 페이지</h3>

        <div
            style="
                display:grid;
                grid-template-columns:1fr 1fr 1fr;
                gap:12px;
                margin-top:20px;
            "
        >

            <button
                class="btn primary"
                onclick="showAdminTab('stats')"
                style="margin-top:0;"
            >
                동아리 주간 출석 현황
            </button>

            <!-- 🔥 추가 -->
            <button
                class="btn primary"
                onclick="showAdminTab('attendance-check')"
                style="margin-top:0;"
            >
                출석 체크 현황
            </button>

            <button
                class="btn primary"
                onclick="showAdminTab('calendar')"
                style="margin-top:0;"
            >
                대관 캘린더
            </button>

        </div>

        <!-- 출석 현황 -->
        <div
            id="admin-stats-section"
            class="hidden"
            style="margin-top:25px;"
        >

            <p
                style="
                    text-align:center;
                    color:#666;
                    font-size:16px;
                    margin-bottom:15px;
                "
            >
                매주 전체 출석 인원 합계입니다.
            </p>

            <div id="admin-content"></div>

        </div>

        <!-- 🔥 추가 : 출석 체크 현황 -->
        <div
            id="admin-attendance-check-section"
            class="hidden"
            style="margin-top:25px;"
        >

            <p
                style="
                    text-align:center;
                    color:#666;
                    font-size:16px;
                    margin-bottom:15px;
                "
            >
                저번주 / 이번주 출석부 체크 여부입니다.
            </p>

            <div id="attendance-check-content">

                <p style="text-align:center; padding:20px;">
                    불러오는 중...
                </p>

            </div>

        </div>

        <!-- 대관 캘린더 -->
        <div
            id="admin-calendar-section"
            class="hidden"
            style="margin-top:25px;"
        >

            <div class="calendar-container">

                <iframe
                    src="https://calendar.google.com/calendar/embed?src=29f49ca08ab45c6d905555a73977703f275fd464e254ed959725c9046b3a6436%40group.calendar.google.com&ctz=Asia%2FSeoul"
                    frameborder="0"
                    scrolling="no"
                ></iframe>

            </div>

        </div>

        <button
            class="btn secondary"
            onclick="location.href='index.html'"
            style="margin-top:30px;"
        >
            메인 화면으로
        </button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>

    adminAuth();

    // 🔥 추가
    async function loadAttendanceCheck() {

        const box = document.getElementById('attendance-check-content');

        box.innerHTML = `
            <p style="text-align:center; padding:20px;">
                불러오는 중...
            </p>
        `;

        try {

            const data = await apiGet("getAttendanceStatus");

            if(!data || data.length === 0) {

                box.innerHTML = `
                    <p style="text-align:center; padding:20px;">
                        데이터가 없습니다.
                    </p>
                `;

                return;
            }

            let html = `
                <table>
                    <tr>
                        <th>동아리</th>
                        <th>저번주</th>
                        <th>이번주</th>
                    </tr>
            `;

            data.forEach(d => {

                html += `
                    <tr>
                        <td>${d.club}</td>

                        <td style="
                            font-weight:bold;
                            color:${d.lastWeek ? '#3182f6' : 'red'};
                        ">
                            ${d.lastWeek ? '완료' : '미체크'}
                        </td>

                        <td style="
                            font-weight:bold;
                            color:${d.thisWeek ? '#3182f6' : 'red'};
                        ">
                            ${d.thisWeek ? '완료' : '미체크'}
                        </td>
                    </tr>
                `;
            });

            html += `</table>`;

            box.innerHTML = html;

        } catch(e) {

            box.innerHTML = `
                <p style="text-align:center; color:red;">
                    불러오기 실패
                </p>
            `;
        }
    }

    function showAdminTab(tab) {

        document
            .getElementById('admin-stats-section')
            .classList.add('hidden');

        // 🔥 추가
        document
            .getElementById('admin-attendance-check-section')
            .classList.add('hidden');

        document
            .getElementById('admin-calendar-section')
            .classList.add('hidden');

        if(tab === 'stats') {

            document
                .getElementById('admin-stats-section')
                .classList.remove('hidden');

            loadStats();
        }

        // 🔥 추가
        if(tab === 'attendance-check') {

            document
                .getElementById('admin-attendance-check-section')
                .classList.remove('hidden');

            loadAttendanceCheck();
        }

        if(tab === 'calendar') {

            document
                .getElementById('admin-calendar-section')
                .classList.remove('hidden');
        }
    }

    document
        .getElementById('admin-stats-section')
        .classList.add('hidden');

    // 🔥 추가
    document
        .getElementById('admin-attendance-check-section')
        .classList.add('hidden');

    document
        .getElementById('admin-calendar-section')
        .classList.add('hidden');

</script>

</body>
</html>
